<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- SERVIS v2.5 TEMPOREAL JUN2026 -->
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Servis Técnica Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080C12;color:#F0F6FF;height:100vh;overflow:hidden}
input,select,textarea{background:#0F1520;border:1px solid #1E2D45;color:#F0F6FF;border-radius:8px;padding:8px 12px;font-size:13px;width:100%;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#3B82F6}
button{cursor:pointer;font-family:inherit;border:none;border-radius:8px;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0F1520}
::-webkit-scrollbar-thumb{background:#263550;border-radius:4px}
.spin{animation:spin 0.8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== RESPONSIVIDADE MOBILE (Servis) ===== */
.servis-hamburger{ display:none; }
.servis-overlay{ display:none; }
@media (max-width: 820px){
  .servis-sidebar{
    position:fixed !important; top:0; left:0; bottom:0; z-index:1000;
    width:78% !important; max-width:300px;
    transform:translateX(-105%); transition:transform .25s ease;
    box-shadow:2px 0 18px rgba(0,0,0,.5);
  }
  .servis-sidebar.aberta{ transform:translateX(0); }
  .servis-overlay{
    display:block; position:fixed; inset:0; z-index:999;
    background:rgba(0,0,0,.55);
  }
  .servis-hamburger{
    display:flex; align-items:center; justify-content:center;
    position:sticky; top:0; z-index:50;
    width:42px; height:42px; margin:8px; border:none; border-radius:10px;
    background:#1A5FA8; color:#fff; font-size:20px; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
  }
  /* tabelas roláveis no celular */
  table{ display:block; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; }
  /* formulários e grids em coluna única */
  [style*="grid-template-columns"]{ grid-template-columns:1fr !important; }
  /* reduzir paddings grandes */
  [style*="padding:40"], [style*="padding:60"]{ padding:20px !important; }
}
@media (max-width: 480px){
  .servis-sidebar{ width:86% !important; }
}
</style>

// Guarda de somente-leitura: bloqueia escrita/exclusão para técnico e visualizador
window._servisNivel=window._servisNivel||"";
function _servisSoLeitura(){return window._servisNivel==="tecnico"||window._servisNivel==="visualizador";}
// Tabelas que técnicos PODEM escrever (campo): registram OS e atualizam status
const _ESCRITA_TECNICO=["os","os_pendencia","preventivas","preventivas_docs","tecnicos_localizacao"];
const sb=new Proxy(sbRaw,{
  get:function(target,prop){
    if(prop==="from"){
      return function(tabela){
        var q=target.from(tabela);
        if(_servisSoLeitura()){
          var liberada=(window._servisNivel==="tecnico")&&_ESCRITA_TECNICO.indexOf(tabela)>=0;
          if(!liberada){
            ["insert","update","delete","upsert"].forEach(function(m){
              q[m]=function(){
                try{alert("Seu perfil tem acesso somente de leitura. Esta ação não é permitida.");}catch(e){}
                var bloqueado={data:null,error:{message:"Permissão negada: perfil somente leitura",code:"RO_BLOCK"}};
                // Retorna objeto encadeável: .eq().match() etc. e também "thenable" (await funciona)
                var chain={
                  then:function(cb){return Promise.resolve(bloqueado).then(cb);},
                  catch:function(cb){return Promise.resolve(bloqueado).catch(cb);}
                };
                ["eq","neq","match","in","is","select","order","limit","single","gt","lt","gte","lte","like","ilike"].forEach(function(fn){chain[fn]=function(){return chain;};});
                return chain;
              };
            });
          }
        }
        return q;
      };
    }
    return target[prop];
  }
});

// ===== Supabase Realtime: avisa o front quando uma tabela muda (entre usuários) =====
function servisRealtime(tabela, callback){
  try{
    var ch=sbRaw.channel("rt_"+tabela+"_"+Math.random().toString(36).slice(2,7));
    ch.on("postgres_changes",{event:"*",schema:"public",table:tabela},function(){
      try{callback();}catch(e){}
    }).subscribe();
    return function(){ try{sbRaw.removeChannel(ch);}catch(e){} };
  }catch(e){ return function(){}; }
}

function Donut({data}){
  if(!data||!data.length)return null;
  const total=data.reduce((s,d)=>s+d.v,0);
  if(total===0)return null;
  let angle=0;
  const R=40,cx=55,cy=55;
  const paths=data.filter(d=>d.v>0).map(d=>{
    const a=(d.v/total)*Math.PI*2;
    const x1=cx+R*Math.sin(angle),y1=cy-R*Math.cos(angle);
    const x2=cx+R*Math.sin(angle+a),y2=cy-R*Math.cos(angle+a);
    const large=a>Math.PI?1:0;
    const path=`M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`;
    angle+=a;
    return {path,color:d.c,label:d.l,v:d.v};
  });
  return React.createElement("div",{style:{display:"flex",alignItems:"center",gap:16}},
    React.createElement("svg",{width:110,height:110,viewBox:"0 0 110 110"},

function GraficoOS(){
  const [filtAno,setFiltAno]=useState("Todos");
  const [filtMeses,setFiltMeses]=useState([]);
  const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const filtered=MONTHLY.filter(d=>(filtAno==="Todos"||String(d.ano)===filtAno)&&(filtMeses.length===0||filtMeses.includes(d.mes)));
  const total=filtered.reduce((s,d)=>s+d.total,0);
  const media=filtered.length?Math.round(total/filtered.length):0;
  const melhor=filtered.length?filtered.reduce((a,b)=>b.total>a.total?b:a):null;
  const maxV=Math.max(...filtered.map(d=>d.total),1);
  const toggleMes=m=>setFiltMeses(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);
  return React.createElement(Card,{style:{marginBottom:16}},
    React.createElement(CardHeader,{title:"Histórico de OS",right:
      React.createElement("div",{style:{display:"flex",gap:6}},
        (filtAno!=="Todos"||filtMeses.length>0)&&React.createElement("button",{style:iBtn(C.dim),onClick:()=>{setFiltAno("Todos");setFiltMeses([]);}},"✕"),
        ["Todos","2025","2026"].map((a,i)=>React.createElement("button",{key:a,style:btnStyle(i===1?C.blue:i===2?C.cyan:C.muted,filtAno!==a),onClick:()=>setFiltAno(a)},a))
      )

    React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}},
      MESES.map(m=>React.createElement("button",{key:m,style:{...iBtn(filtMeses.includes(m)?C.yellow:C.dim),fontSize:11},onClick:()=>toggleMes(m)},m))
    ),
    filtered.length===0?React.createElement("div",{style:{textAlign:"center",padding:40,color:C.dim}},"Nenhum dado"):
    React.createElement("div",null,
      React.createElement("svg",{width:"100%",viewBox:`0 0 ${Math.max(filtered.length*50,300)} 120`,preserveAspectRatio:"xMidYMid meet"},
        React.createElement("defs",null,
          React.createElement("linearGradient",{id:"gb25",x1:0,y1:0,x2:0,y2:1},React.createElement("stop",{offset:"0%",stopColor:C.blue,stopOpacity:0.9}),React.createElement("stop",{offset:"100%",stopColor:C.blue,stopOpacity:0.3})),
          React.createElement("linearGradient",{id:"gb26",x1:0,y1:0,x2:0,y2:1},React.createElement("stop",{offset:"0%",stopColor:C.cyan,stopOpacity:0.9}),React.createElement("stop",{offset:"100%",stopColor:C.cyan,stopOpacity:0.3}))
        ),
        filtered.map((d,i)=>{
          const bw=Math.min(35,(Math.max(filtered.length*50,300)/filtered.length)-6);

          const x=i*(Math.max(filtered.length*50,300)/filtered.length)+3;
          return React.createElement("g",{key:i},
            React.createElement("rect",{x,y:100-bh+5,width:bw,height:bh,fill:`url(#gb${d.ano})`,rx:4}),
            React.createElement("text",{x:x+bw/2,y:100-bh,textAnchor:"middle",fontSize:8,fill:C.text},d.total),

            React.createElement("div",{style:{fontSize:14,fontWeight:700,color:k.c}},k.v)

// Helper: gerar tabela HTML padrão Servis
function servisTabela(cols,rows){
  var th=cols.map(function(c){return "<th>"+c+"</th>";}).join("");
  var tr=rows.map(function(r){
    return "<tr>"+r.map(function(c){return "<td>"+(c||"—")+"</td>";}).join("")+"</tr>";
  }).join("");
  return "<table><thead><tr>"+th+"</tr></thead><tbody>"+tr+"</tbody></table>";
}

// Helper: gerar KPIs HTML padrão Servis
function servisKPIs(kpis){
  return "<div class='kpi-grid'>"+kpis.map(function(k){
    return "<div class='kpi-card'><div class='kpi-value'>"+k.v+"</div><div class='kpi-label'>"+k.l+"</div></div>";
  }).join("")+"</div>";
}

// ── AUDITORIA: registra ações sensíveis (exclusão, edição crítica) ──
// ── SEGURANÇA DE SENHAS ──
async function servisHashSenha(senha){
  // SHA-256 nativo do browser + salt fixo do sistema
  try{
    var txt=new TextEncoder().encode("servis_2026_"+senha);
    var buf=await crypto.subtle.digest("SHA-256",txt);
    return "h$"+Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
  }catch(e){
    return senha; // fallback se crypto não disponível
  }
}
// Verifica senha contra valor armazenado (compatível com senhas antigas em texto plano)
async function servisVerificarSenha(senhaDigitada,senhaArmazenada){
  if(!senhaArmazenada)return false;
  // Se já está com hash (prefixo h$), comparar hash
  if(String(senhaArmazenada).indexOf("h$")===0){
    var h=await servisHashSenha(senhaDigitada);
    return h===senhaArmazenada;
  }
  // Senha antiga em texto plano — comparação direta (será migrada no próximo login)
  return senhaDigitada===senhaArmazenada;
}
// Valida força da senha — retorna mensagem de erro ou null se OK
function servisValidarSenha(senha){
  if(senha.length<8)return "A senha deve ter no mínimo 8 caracteres";
  if(!/[A-Za-z]/.test(senha))return "A senha deve conter ao menos uma letra";
  if(!/[0-9]/.test(senha))return "A senha deve conter ao menos um número";
  return null;
}

  try{

      id:"aud_"+Date.now()+"_"+Math.random().toString(36).slice(2,7),
      acao:acao,
      tabela:tabela,

function Dashboard({setTab}){
  const [stats,setStats]=useState({
    osAbertas:0,osFechadas:0,osTotal:0,
    tecnicos:0,condominios:0,
    hePend:0,heTotal:0,heAprov:0,heRegistros:0,
    atTotal:0,atAprov:0,atAnalise:0,atAfastados:[],
    prevConcluidas:0,prevPendentes:0,prevAndamento:0,
    pedidosPend:0,pedidosRetirada:0,pedidosDev:0,
    slaVencidas:0,reincidencias:0,
    osPorMes:[],osAbertas16:[],
    osAltaPrio:0,osPorEquip:[],prevAtrasadas:0,topTecs:[],topConds:[],tempoMedio:null
  });
  const [loading,setLoading]=useState(true);
  const [anoFiltro,setAnoFiltro]=useState("");
  const [mesFiltro,setMesFiltro]=useState("");
  const {tick}=React.useContext(RefreshCtx);

  const loadAll=useCallback(async function(){
      try{
      setLoading(true);
      const[
        {data:osData},{data:tecData},{data:condData},
        {data:heData},{data:atData},{data:prevData},{data:pedData},
        {data:areaData},{data:condAreaData}
      ]=await Promise.all([
        (async function(){
          let all=[];let from=0;const step=1000;
          while(true){
            const{data:chunk}=await sb.from("os").select("num,data,status,cond,tec,prob,pri,relato")
              .or("status.eq.Aberto,data.gte.2026-01-01")
              .order("data",{ascending:false}).range(from,from+step-1);
            if(!chunk||chunk.length===0)break;
            all=all.concat(chunk);
            if(chunk.length<step)break;
            from+=step;
          }
          return{data:all};
        })(),
        sb.from("tecnicos").select("id"),
        sb.from("condominios").select("id"),
        sb.from("horas_extras").select("status,total_h"),
        sb.from("atestados").select("status,tec,retorno"),
        sb.from("preventivas").select("status,retorno"),
        sb.from("pedidos").select("status"),
        sb.from("areas_responsaveis").select("area,tecnico"),
        sb.from("condominios").select("nome,area_tecnico")
      ]);
      const os=osData||[];
      const hoje=new Date();
      const mesAtual=String(hoje.getMonth()+1).padStart(2,"0");
      const anoAtual=String(hoje.getFullYear());

      // OS abertas reais
      const osAb=os.filter(d=>d.status==="Aberto");
      const osFech=os.filter(d=>d.status==="Fechado");

      // HE
      const he=heData||[];
      const heTotal=he.reduce((s,d)=>s+(d.total_h||0),0);

      // Atestados
      const at=atData||[];
      const afastados=at.filter(d=>{
        if(d.status!=="Aprovado"||!d.retorno)return false;
        return new Date(d.retorno)>hoje;
      });

      // Preventivas
      const prev=prevData||[];

      // Pedidos
      const ped=pedData||[];

      // SLA vencidas
      function calcPrazo(dataAb){
        var d=new Date(dataAb+"T08:00:00");
        var h=48;
        while(h>0){var dow=d.getDay();if(dow!==0&&dow!==6){var hd=Math.min(h,10);d.setHours(d.getHours()+hd);h-=hd;if(d.getHours()>=18){d.setDate(d.getDate()+1);d.setHours(8,0,0,0);}}else{d.setDate(d.getDate()+1);d.setHours(8,0,0,0);}}
        return d;
      }
      var slaVenc=osAb.filter(function(o){return o.data&&hoje>calcPrazo(o.data);}).length;

      // Reincidências mês atual
      var mapReinc={};
      os.filter(function(d){
        if(!d.data)return false;
        var p=d.data.split("-");
        return p[1]===mesAtual&&p[0]===anoAtual;
      }).forEach(function(os){
        var k=os.cond+"||"+os.prob;
        if(!mapReinc[k])mapReinc[k]=0;
        mapReinc[k]++;
      });
      var reinc=Object.values(mapReinc).filter(function(v){return v>=2;}).length;

      // OS por mês — aplicar filtros
      var osFilt=os.filter(function(d){
        if(!d.data)return false;
        var p=d.data.split("-");
        if(anoFiltro&&p[0]!==anoFiltro)return false;
        if(mesFiltro&&p[1]!==mesFiltro)return false;
        return true;
      });
      var mapMes={};
      osFilt.forEach(function(d){
        var p=d.data.split("-");
        var k=p[0]+"-"+p[1];
        var meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        if(!mapMes[k])mapMes[k]={key:k,label:meses[parseInt(p[1])-1]+"/"+p[0].slice(2),total:0,abertas:0,fechadas:0};
        mapMes[k].total++;
        if(d.status==="Aberto")mapMes[k].abertas++;
        else mapMes[k].fechadas++;
      });
      // Totais reais do banco por mês — sem overrides fixos
      var mesHoje=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
      var osPorMes=Object.values(mapMes).filter(function(d){return d.key>="2026-01"&&d.key<=mesHoje;}).sort(function(a,b){return a.key.localeCompare(b.key);});
      // Total real = soma dos meses do banco
      var totalReal=osPorMes.reduce(function(s,d){return s+d.total;},0);
      setStats({
        osAbertas:osAb.length,osFechadas:osFech.length,osTotal:os.length,
        tecnicos:(tecData||[]).length,condominios:(condData||[]).length,
        hePend:he.filter(d=>d.status==="Pendente").length,
        heTotal,heAprov:he.filter(d=>d.status==="Aprovado").length,heRegistros:he.length,
        atTotal:at.length,atAprov:at.filter(d=>d.status==="Aprovado").length,
        atAnalise:at.filter(d=>d.status==="Em análise").length,atAfastados:afastados,
        prevConcluidas:prev.filter(d=>d.status==="Concluída").length,
        prevPendentes:prev.filter(d=>d.status==="Pendente").length,
        prevAndamento:prev.filter(d=>d.status==="Em andamento").length,
        pedidosPend:ped.filter(d=>d.status==="Pendente Retirada").length,
        pedidosDev:ped.filter(d=>d.status==="Pendente Devolução").length,
        pedidosTotal:ped.length,
        slaVencidas:slaVenc,reincidencias:reinc,
        osPorMes,osAbertas16:osAb.slice(0,6),
        // OS Alta Prioridade em aberto
        osAltaAberta:osAb.filter(function(o){return o.pri==="Alta";}).length,
        osMediaAberta:osAb.filter(function(o){return o.pri==="Media"||o.pri==="Média";}).length,
        // OS por tipo de equipamento (top 6)
        osPorEquip:(function(){
          var m={};
          os.forEach(function(o){if(o.prob)m[o.prob]=(m[o.prob]||0)+1;});
          return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,6).map(function(e){return{nome:e[0],qtd:e[1]};});
        })(),
        // Preventivas atrasadas (retorno < hoje e não concluída)
        prevAtrasadas:(function(){
          var hojeStr=new Date().toISOString().slice(0,10);
          return prev.filter(function(p){return p.retorno&&p.retorno<hojeStr&&p.status!=="Concluída";}).length;
        })(),
        // Top técnicos por OS fechadas
        topTecs:(function(){
          var m={};
          osFech.forEach(function(o){if(o.tec)m[o.tec]=(m[o.tec]||0)+1;});
          return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return{nome:e[0],qtd:e[1]};});
        })(),
        // Produtividade por equipe (área)
        topEquipes:(function(){
          // mapear técnico → área
          var tecArea={};
          (areaData||[]).forEach(function(a){if(a.tecnico)tecArea[a.tecnico]=a.area;});
          var m={};
          osFech.forEach(function(o){
            var area=o.tec&&tecArea[o.tec]?tecArea[o.tec]:"Sem área";
            m[area]=(m[area]||0)+1;
          });
          return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,6).map(function(e){return{nome:e[0],qtd:e[1]};});
        })(),
        // Top condomínios por OS
        topConds:(function(){
          var m={};
          os.forEach(function(o){if(o.cond)m[o.cond]=(m[o.cond]||0)+1;});
          return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return{nome:e[0],qtd:e[1]};});
        })(),
        // Tempo médio de atendimento
        tempoMedio:(function(){
          var tempos=osFech.filter(function(o){return o.data&&o.data_fechamento;}).map(function(o){return (new Date(o.data_fechamento)-new Date(o.data))/(1000*3600);}).filter(function(h){return h>0&&h<720;});
          return tempos.length>0?Math.round(tempos.reduce(function(a,b){return a+b;},0)/tempos.length):null;
        })(),
        // OS Alta Prioridade em aberto
        osAltaPrio:osAb.filter(function(o){return o.pri==="Alta";}).length,
        // OS por tipo de equipamento (top 5)
        osPorEquip:(function(){
          var m={};
          os.forEach(function(o){var p=o.prob||"Outros";m[p]=(m[p]||0)+1;});
          return Object.entries(m).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){return{nome:e[0],qtd:e[1]};});
        })(),
        // Preventivas atrasadas (retorno vencido e não concluída)
        prevAtrasadas:(function(){
          var hojeISO=new Date().toISOString().slice(0,10);
          return (prevData||[]).filter(function(p){return p.retorno&&p.retorno<hojeISO&&p.status!=="Concluída";}).length;
        })()
      });
      setLoading(false);
      }catch(err){console.error("Dashboard erro:",err);setLoading(false);}
    },[anoFiltro,mesFiltro,tick]);

  useEffect(function(){loadAll();},[loadAll]);

  const anos=useMemo(()=>{
    var a=[];
    for(var y=2025;y<=new Date().getFullYear();y++)a.push(String(y));
    return a;
  },[]);
  const MESES_L=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const maxOS=Math.max(...stats.osPorMes.map(d=>d.total),1);
  const totalReal2026=stats.osTotal||stats.osPorMes.reduce(function(s,d){return s+d.total;},0);
  const mediaMensal=stats.osPorMes.length>0?Math.round(totalReal2026/stats.osPorMes.length):0;
  const melhorMes=stats.osPorMes.reduce((m,d)=>d.total>m.total?d:m,{total:0,label:"—"});

  return React.createElement("div",null,
    React.createElement("div",{style:{background:C.surface,padding:"16px 24px",position:"sticky",top:0,zIndex:10,borderBottom:`1px solid ${C.border}`}},
      React.createElement("div",{style:{fontSize:18,fontWeight:700}},"▦ Dashboard"),
      React.createElement("div",{style:{fontSize:12,color:C.muted}},"Visão geral operacional — dados em tempo real"),
      React.createElement("div",{style:{display:"flex",gap:6,marginTop:10,flexWrap:"wrap",alignItems:"center"}},
        React.createElement("select",{style:{...base.sel,width:90,fontSize:11},value:anoFiltro,onChange:function(e){setAnoFiltro(e.target.value);}},
          [String(new Date().getFullYear()),String(new Date().getFullYear()-1)].map(function(a){return React.createElement("option",{key:a,value:a},a);})
        ),
        React.createElement("select",{style:{...base.sel,width:110,fontSize:11},value:mesFiltro,onChange:function(e){setMesFiltro(e.target.value);}},
          React.createElement("option",{value:""},"Ano todo"),
          ["01","02","03","04","05","06","07","08","09","10","11","12"].map(function(m,i){return React.createElement("option",{key:m,value:m},["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][i]);})
        ),
        React.createElement("button",{
          style:{...btnStyle(C.green,true),fontSize:11,padding:"6px 12px"},
          onClick:function(){
            try{
              var anoLabel=anoFiltro||String(new Date().getFullYear());
              var mesLabel=mesFiltro?["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][parseInt(mesFiltro)]:"Ano todo";
              var kpis=servisKPIs([

                {l:"Preventivas OK",v:stats.prevConcluidas||0},{l:"T.Médio",v:stats.tempoMedio!=null?stats.tempoMedio+"h":"—"},
              ]);
              var topTecsHtml=(stats.topTecs||[]).length>0?"<div class='section-title'>🏆 Top Técnicos</div>"+servisTabela(["Técnico","OS Fechadas"],(stats.topTecs||[]).map(function(t){return [t.nome,String(t.qtd)];})):"";
              var topCondsHtml=(stats.topConds||[]).length>0?"<div class='section-title' style='margin-top:16px'>🏦 Top Condomínios</div>"+servisTabela(["Condomínio","OS"],(stats.topConds||[]).map(function(c){return [c.nome,String(c.qtd)];})):"";

  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);

  const [busca,setBusca]=useState("");
  const [filtNivel,setFiltNivel]=useState("");

  var isAdmin=(usuarioAtual?.nivel||"").toLowerCase()==="admin";

    setLoading(true);
    const{data}=await sb.from("usuarios").select("id,nome,nivel,ativo,primeiro_acesso,foto_url").order("nome");
    setUsers(data||[]);setLoading(false);

  const filtered=useMemo(function(){

      var mn=!filtNivel||u.nivel===filtNivel;
      return mb&&mn;

    if(id===usuarioAtual?.id){alert("Não é possível excluir seu próprio usuário.");return;}
    await sb.from("usuarios").delete().eq("id",id);
    setConfirmDel(null);load();
  };

  const toggleAtivo=async function(u){
    if(u.id===usuarioAtual?.id){alert("Não é possível desativar seu próprio usuário.");return;}

    ),
    React.createElement("div",{style:{padding:"20px 24px"}},

        React.createElement(KPI,{label:"Alertas (2)",value:reincidencias.filter(r=>r.count===2).length,color:C.yellow})
      ),

      reincidencias.length===0
        ?React.createElement(Card,null,

// ── SLA & OPERAÇÃO ────────────────────────────────────────────
function SLA(){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filtro,setFiltro]=useState("Todas");
  const [busca,setBusca]=useState("");
  const [filtTec,setFiltTec]=useState("");
  const [filtPri,setFiltPri]=useState("");
  const [filtAno,setFiltAno]=useState(String(new Date().getFullYear()));
  const [filtMes,setFiltMes]=useState(String(new Date().getMonth()+1).padStart(2,"0"));
  const [detalhe,setDetalhe]=useState(null);
  const [pagina,setPagina]=useState(1);
  const POR_PAG=20;
  const MESES_N=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const {tick}=React.useContext(RefreshCtx);

  const load=useCallback(async()=>{
    setLoading(true);
    // Buscar apenas OS de 2026 com cruzamento de condomínios
    const [{data:rows},{data:conds}]=await Promise.all([
      (async function(){
      let all=[];let from=0;const step=1000;
      while(true){
        const{data:chunk}=await sb.from("os").select("*")
          .gte("data","2026-01-01").order("data",{ascending:false}).range(from,from+step-1);
        if(!chunk||chunk.length===0)break;
        all=all.concat(chunk);
        if(chunk.length<step)break;
        from+=step;
      }
      return{data:all};
    })(),
      sb.from("condominios").select("nome,endereco,tecnico")
    ]);
    const mapEnd={};
    (conds||[]).forEach(c=>{if(c.nome)mapEnd[c.nome.toLowerCase()]={endereco:c.endereco||"",tecnico:c.tecnico||""};});
    function buscarEnd(nomeCond){
      if(!nomeCond)return{endereco:"",tecnico:""};
      const exato=mapEnd[nomeCond.toLowerCase()];
      if(exato)return exato;
      const key=Object.keys(mapEnd).find(k=>k.includes((nomeCond||"").toLowerCase().slice(0,12))||(nomeCond||"").toLowerCase().includes(k.slice(0,12)));
      return key?mapEnd[key]:{endereco:"",tecnico:""};
    }
    if(rows){rows.forEach(r=>{const info=buscarEnd(r.cond);r._endereco=info.endereco;});}
    setData(rows||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load,tick]);

  // Calcular horas úteis entre duas datas (seg-sex, 8h-18h)
  const calcHorasUteis=useCallback((dataInicio,dataFim)=>{
    if(!dataInicio)return 0;
    const d1=new Date(dataInicio+"T08:00:00");
    const d2=dataFim?new Date(dataFim+"T18:00:00"):new Date();
    if(d2<=d1)return 0;
    let horas=0;const cur=new Date(d1);
    while(cur<d2){
      const dow=cur.getDay();
      if(dow!==0&&dow!==6){
        const ini=new Date(cur);ini.setHours(8,0,0,0);
        const fim=new Date(cur);fim.setHours(18,0,0,0);
        const s=cur<ini?ini:cur;const e=d2<fim?d2:fim;
        if(e>s)horas+=(e-s)/3600000;
      }
      cur.setDate(cur.getDate()+1);cur.setHours(8,0,0,0);
    }
    return Math.round(horas*10)/10;
  },[]);

  const calcPrazo=useCallback((dataAbertura)=>{
    if(!dataAbertura)return new Date();
    const d=new Date(dataAbertura+"T08:00:00");
    let h=48;
    while(h>0){
      const dow=d.getDay();
      if(dow!==0&&dow!==6){const hd=Math.min(h,10);d.setHours(d.getHours()+hd);h-=hd;if(d.getHours()>=18){d.setDate(d.getDate()+1);d.setHours(8,0,0,0);}}
      else{d.setDate(d.getDate()+1);d.setHours(8,0,0,0);}
    }
    return d;
  },[]);

  const hoje=new Date();

  const osComSLA=useMemo(()=>{
    return data.map(os=>{
      if(!os.data)return null;
      const prazo=calcPrazo(os.data);
      const vencido=os.status==="Aberto"&&hoje>prazo;
      const horasRestantes=os.status==="Aberto"?Math.max(0,Math.round((prazo-hoje)/3600000*10)/10):null;
      const dataFechamento=os.data_fechamento||null;
      const horasUteis=calcHorasUteis(os.data,dataFechamento);
      let situacao;
      if(os.status==="Fechado"){
        situacao=horasUteis<=48?"Dentro do SLA":"Fora do SLA";
      }else{
        var horasAtuais=calcHorasUteis(os.data,null);
        situacao=vencido?"Vencida":(horasAtuais>=40?"Em risco":"Em andamento");
      }
      return {...os,prazo,vencido,horasRestantes,horasUteis,situacao};
    }).filter(Boolean);
  },[data,calcHorasUteis,calcPrazo]);

  const corSituacao=s=>s==="Dentro do SLA"?C.green:s==="Fora do SLA"?C.red:s==="Vencida"?C.red:s==="Em risco"?C.orange:C.yellow;

  const anos=useMemo(()=>[...new Set(data.map(d=>d.data?.slice(0,4)).filter(Boolean))].sort().reverse(),[data]);
  const tecs=useMemo(()=>[...new Set(data.map(d=>d.tec).filter(Boolean))].sort(),[data]);

  const filtered=useMemo(()=>{
    return osComSLA.filter(os=>{
      const p=os.data?.split("-")||[];
      const matchFiltro=filtro==="Todas"||(filtro==="Abertas"&&os.status==="Aberto")||(filtro==="Fechadas"&&os.status==="Fechado")||(filtro==="Vencidas"&&os.situacao==="Vencida")||(filtro==="Fora do SLA"&&os.situacao==="Fora do SLA");
      const matchBusca=!busca||(os.num||"").includes(busca)||(os.cond||"").toLowerCase().includes(busca.toLowerCase());
      const matchTec=!filtTec||os.tec===filtTec;
      const matchPri=!filtPri||os.pri===filtPri;
      const matchAno=!filtAno||p[0]===filtAno;
      const matchMes=!filtMes||p[1]===filtMes;
      return matchFiltro&&matchBusca&&matchTec&&matchAno&&matchMes;
    });
  },[osComSLA,filtro,busca,filtTec,filtAno,filtMes]);

  // Estatísticas
  const stats=useMemo(()=>{
    const fechadas=osComSLA.filter(o=>o.status==="Fechado"&&o.horasUteis>0);
    const dentroSLA=fechadas.filter(o=>o.horasUteis<=48).length;
    const foraSLA=fechadas.filter(o=>o.horasUteis>48).length;
    const tempoMedio=fechadas.length>0
      ?Math.round(fechadas.reduce((s,o)=>s+o.horasUteis,0)/fechadas.length*10)/10
      :0;
    const pctSLA=fechadas.length>0?Math.min(100,Math.round((dentroSLA/fechadas.length)*100)):0;
    return {
      total:osComSLA.length,
      abertas:osComSLA.filter(o=>o.status==="Aberto").length,
      vencidas:osComSLA.filter(o=>o.situacao==="Vencida").length,
      emRisco:osComSLA.filter(o=>o.situacao==="Em risco").length,
      dentroSLA,
      foraSLA,
      pctSLA,
      tempoMedio,
      fechadas:fechadas.length,
      // Taxa de SLA mês a mês (últimos 6 meses)
      slaPorMes:(function(){
        var meses={};
        fechadas.forEach(function(o){
          if(!o.data)return;
          var mes=(o.data||"").slice(0,7);
          if(!meses[mes])meses[mes]={dentro:0,total:0};
          meses[mes].total++;
          if(o.horasUteis<=48)meses[mes].dentro++;
        });
        return Object.entries(meses).sort(function(a,b){return a[0]<b[0]?-1:1;}).slice(-6).map(function(e){
          return{mes:e[0],pct:e[1].total>0?Math.round(e[1].dentro/e[1].total*100):0,total:e[1].total};
        });
      })()
    };
  },[osComSLA]);

  const totalPags=Math.ceil(filtered.length/POR_PAG);
  const paginado=filtered.slice((pagina-1)*POR_PAG,pagina*POR_PAG);
  useEffect(()=>{setPagina(1);},[filtro,busca,filtTec,filtPri,filtAno,filtMes]);

  return React.createElement("div",null,
    React.createElement("div",{style:{background:C.surface,padding:"16px 24px",position:"sticky",top:0,zIndex:10,borderBottom:`1px solid ${C.border}`}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:18,fontWeight:700}},"⏱ SLA & Operação"),
          React.createElement("div",{style:{fontSize:11,color:C.muted}},"Cruzamento em tempo real com Ordens de Serviço · Prazo 48h úteis")
        ),
        React.createElement("div",{style:{display:"flex",gap:6}},
          React.createElement("button",{
            style:{...btnStyle(C.green,true),fontSize:11,padding:"7px 14px"},
            onClick:function(){
              try{
                var osVenc=(data||[]).filter(function(o){return o._sla==="vencido";});
                var osRisco=(data||[]).filter(function(o){return o._sla==="risco";});
                var osOk=(data||[]).filter(function(o){return o._sla==="ok";});
                var kpis=servisKPIs([
                  {l:"Total OS",v:(data||[]).length},
                  {l:"SLA Vencido",v:osVenc.length},
                  {l:"Em Risco",v:osRisco.length},
                  {l:"No Prazo",v:osOk.length},
                ]);
                var linhas=(data||[]).slice(0,50).map(function(o){
                  var h=o.data?Math.round((new Date()-new Date(o.data))/3600000):0;
                  return [o.num||"",o.cond||"",o.tec||"",o.prob||"",o.pri||"",h+"h",o.status||""];
                });
                servisRelatorioPDF("Relatório de SLA & Operação",kpis+servisTabela(["Nº OS","Condomínio","Técnico","Problema","Prioridade","Horas","Status"],linhas),window._servisUser||"","OS em aberto — prazo 48h úteis","CE");
              }catch(e){alert("Erro: "+e.message);}
            }
          },"📄 PDF"),
          React.createElement("button",{style:{...btnStyle(C.blue,true),fontSize:12},onClick:load},"🔄 Atualizar")
        )
      ),
      // Filtros de status
      React.createElement("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}},
        ["Todas","Abertas","Fechadas","Vencidas","Fora do SLA"].map(f=>
          React.createElement("button",{key:f,style:btnStyle(f==="Vencidas"||f==="Fora do SLA"?C.red:C.blue,filtro!==f),onClick:()=>setFiltro(f)},
            f==="Vencidas"?"🚨 Vencidas":f==="Fora do SLA"?"❌ Fora do SLA":f
          )
        )
      ),
      // Filtros secundários
      React.createElement("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        React.createElement("input",{style:{...base.inp,width:160},placeholder:"Buscar OS ou cond...",value:busca,onChange:e=>{setBusca(e.target.value);setPagina(1);}}),
        React.createElement("select",{style:{...base.sel,width:100},value:filtPri,onChange:function(e){setFiltPri(e.target.value);setPagina(1);}},
          React.createElement("option",{value:""},"Prioridade"),
          React.createElement("option",{value:"Alta"},"🔴 Alta"),
          React.createElement("option",{value:"Media"},"🟡 Média"),
          React.createElement("option",{value:"Baixa"},"🟢 Baixa")
        ),
        React.createElement("select",{style:{...base.sel,width:155},value:filtTec,onChange:e=>{setFiltTec(e.target.value);setPagina(1);}},
          React.createElement("option",{value:""},"Todos técnicos"),
          ...tecs.map(t=>React.createElement("option",{key:t,value:t},t))
        ),
        React.createElement("select",{style:{...base.sel,width:90},value:filtAno,onChange:e=>{setFiltAno(e.target.value);setPagina(1);}},
          React.createElement("option",{value:""},"Todos anos"),

        ),

    setLoading(true);
    var dataIni=filtData+" 00:00:00";
    var dataFim=filtData+" 23:59:59";

      sb.from("tecnicos_localizacao").select("*").order("atualizado_em",{ascending:false}),
      sb.from("tecnicos_historico").select("*").gte("criado_em",dataIni).lte("criado_em",dataFim).order("criado_em",{ascending:false}),
    ]);
    setLocs(rl.data||[]);
    setHistorico(rh.data||[]);
    setLoading(false);
  },[filtData,tick]);

  useEffect(function(){load();},[load]);

  function minAgo(dt){if(!dt)return 999;return Math.round((new Date()-new Date(dt))/60000);}
  function statusCor(s){if(!s)return C.dim;var sl=(s||"").toLowerCase();if(sl.includes("campo"))return C.green;if(sl.includes("dispon"))return C.blue;return C.dim;}
  function statusLabel(s){if(!s)return"Desconhecido";if((s||"").toLowerCase().includes("campo"))return"Em Campo";if((s||"").toLowerCase().includes("dispon"))return"Disponível";return s;}

function ModalCronograma({dados,onClose,onSave,condos}){
  const [d,setD]=useState(dados);
  const [salvando,setSalvando]=useState(false);
  const salvar=async function(){
    if(!d.cond){alert("Selecione o condomínio antes de salvar.");return;}
    setSalvando(true);
    try{ if(onSave) await onSave(d); }catch(e){ alert("Erro ao salvar: "+e.message); }
    setSalvando(false);
  };
  const upd=function(campo,valor){setD(function(p){var n={...p};n[campo]=valor;return n;});};
  const updTarefa=function(i,campo,valor){
    setD(function(p){
      var ts=p.tarefas.map(function(t,idx){return idx===i?{...t,[campo]:valor}:t;});
      return {...p,tarefas:ts};
    });
  };
  const addTarefa=function(){
    setD(function(p){return {...p,tarefas:p.tarefas.concat([{tarefa:"",resp:"",inicio:"",fim:""}])};});
  };
  const delTarefa=function(i){
    setD(function(p){return {...p,tarefas:p.tarefas.filter(function(_,idx){return idx!==i;})};});
  };

  const fmtData=function(s){
    if(!s)return "";
    var p=String(s).split("-");
    if(p.length!==3)return s;
    return p[2]+"/"+p[1]+"/"+p[0].slice(2);
  };

  const exportarExcel=function(){
    var linhas=[];
    linhas.push(["CRONOGRAMA DE IMPLANTACAO - SERVIS"]);
    linhas.push(["Condominio",d.cond||""]);
    linhas.push(["Sindico",d.sindico||""]);
    linhas.push(["Supervisor",d.supervisor||""]);
    linhas.push(["Inicio",fmtData(d.inicio)||""]);
    linhas.push([]);
    linhas.push(["#","Tarefa","Responsavel","Inicio","Termino"]);
    (d.tarefas||[]).forEach(function(t,i){
      linhas.push([i+1,t.tarefa||"",t.resp||"",fmtData(t.inicio)||"",fmtData(t.fim)||""]);
    });
    var csv=linhas.map(function(row){
      return row.map(function(cel){return '"'+String(cel==null?"":cel).replace(/"/g,'""')+'"';}).join(";");
    }).join("\r\n");
    var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
    var url=URL.createObjectURL(blob);

// Normaliza texto p/ busca: minúsculas + remove acentos
function servisNorm(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
// Casa se TODAS as palavras digitadas aparecem no alvo (qualquer posição/ordem)
function servisMatch(alvo,consulta){
  var a=servisNorm(alvo);
  var termos=servisNorm(consulta).split(/\s+/).filter(Boolean);
  if(!termos.length)return true;
  return termos.every(function(t){return a.indexOf(t)>=0;});
}
function CondoSearch({value,onChange,options}){
  var temBanco=options&&options.length>0;
  var FONTE=temBanco?options:CONDS;
  var ph=temBanco?("Buscar entre "+FONTE.length+" condomínios..."):"Digite para buscar condomínio...";
  const [q,setQ]=useState(value||"");
  const [aberto,setAberto]=useState(false);
  const [hl,setHl]=useState(0);
  useEffect(function(){setQ(value||"");},[value]);
  var filtro=q.trim();
  var lista=filtro?FONTE.filter(function(c){return servisMatch(c,filtro);}):FONTE;
  var listaCorte=lista.slice(0,300);
  function escolher(c){onChange(c);setQ(c);setAberto(false);}
  return React.createElement("div",{style:{position:"relative"}},
    React.createElement("input",{
      style:{...base.inp,paddingRight:30},
      placeholder:ph,
      value:q,
      onChange:function(e){setQ(e.target.value);setAberto(true);setHl(0);onChange(e.target.value);},
      onFocus:function(){setAberto(true);},
      onKeyDown:function(e){
        if(!aberto)return;
        if(e.key==="ArrowDown"){e.preventDefault();setHl(function(h){return Math.min(h+1,listaCorte.length-1);});}
        else if(e.key==="ArrowUp"){e.preventDefault();setHl(function(h){return Math.max(h-1,0);});}
        else if(e.key==="Enter"){e.preventDefault();if(listaCorte[hl])escolher(listaCorte[hl]);}
        else if(e.key==="Escape"){setAberto(false);}
      },
      onBlur:function(){setTimeout(function(){setAberto(false);},180);}
    }),
    React.createElement("span",{style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:C.muted,pointerEvents:"none"}},"🔍"),

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:osData},{data:prevData},{data:instData},{data:tecData}]=await Promise.all([
      sb.from("os").select("*"),
      sb.from("preventivas").select("*"),
      sb.from("instalacoes").select("*"),
      sb.from("tecnicos").select("id,nome,mat,tipo,status").eq("status","Ativo")
    ]);

    setOs(osData||[]);setPreventivas(prevData||[]);setInstalacoes(instData||[]);
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load,tick]);

  function prazo30(dataInicio){
    if(!dataInicio)return null;
    var d=new Date(dataInicio+"T08:00:00");var h=30;
    while(h>0){d.setDate(d.getDate()+1);if(d.getDay()!==0&&d.getDay()!==6)h--;}
    return d.toISOString().split("T")[0];
  }
  function horasUteis(d1){
    var start=new Date(d1+"T08:00:00");var end=new Date();
    var horas=0;var cur=new Date(start);
    while(cur<end){if(cur.getDay()!==0&&cur.getDay()!==6){var ini=new Date(cur);ini.setHours(8,0,0,0);var fim=new Date(cur);fim.setHours(18,0,0,0);var s=cur<ini?ini:cur;var e=end<fim?end:fim;if(e>s)horas+=(e-s)/3600000;}cur.setDate(cur.getDate()+1);cur.setHours(8,0,0,0);}
    return horas;
  }

  var supervisores=(tecnicos.length>0?tecnicos:[
    {id:"sup1",nome:"Wilton",mat:"T01",tipo:"manutencao"},
    {id:"sup2",nome:"Felipe",mat:"T02",tipo:"manutencao"},
    {id:"sup3",nome:"John",mat:"T03",tipo:"manutencao"},
    {id:"sup4",nome:"Pedro",mat:"T04",tipo:"manutencao"},

    var tipo=t.tipo||"manutencao";
    var icon=tipo==="instalacao"?"🏗️":tipo==="preventiva"?"🔍":"🔧";
    return {id:t.id||t.mat,nome:t.nome,tipo:tipo,icon:icon};
  });

  const pontuacoes=useMemo(()=>{
    var hoje=new Date();
    var mesNum=parseInt(mesSel);var anoNum=parseInt(anoSel);
    var osMes=os.filter(function(d){if(!d.data)return false;var p=d.data.split("-");return parseInt(p[1])===mesNum&&parseInt(p[0])===anoNum;});
    return supervisores.map(function(sup){
      var pts={};var pior=null;var piorVal=100;
      if(sup.tipo==="instalacao"){
        var instC=instalacoes.filter(function(i){return i.data_entrega_portaria&&i.data_inicio;});
        var instOk=instC.filter(function(i){var p=prazo30(i.data_inicio);return p&&i.data_entrega_portaria<=p;});
        pts.prazo=instC.length>0?Math.round((instOk.length/instC.length)*100):100;

          return os.filter(function(o){if(!o.data||!o.cond)return false;var d=new Date(o.data);return (o.cond||"").toLowerCase().includes((inst.cond||"").toLowerCase().slice(0,10))&&d>=entrega&&d<=tresM;}).length===0;
        });
        pts.qualidade=instE.length>0?Math.round((semOS.length/instE.length)*100):100;
        pts.sla=null;pts.recorrencia=null;pts.metaPrev=null;pts.qualPrev=null;
        var nota=Math.round(pts.prazo*0.5+pts.qualidade*0.5);
        if(pts.prazo<piorVal){piorVal=pts.prazo;pior="Prazo de Instalação";}
        if(pts.qualidade<piorVal){piorVal=pts.qualidade;pior="Qualidade Pós-Instalação";}
        return {sup,pts,nota,pior:pior||"—"};
      }
      if(sup.tipo==="manutencao"){
        var totalOS=osMes.length;
        var abertas=osMes.filter(function(o){return o.status==="Aberto";});
        var vencidas=abertas.filter(function(o){return o.data&&horasUteis(o.data)>48;});
        var fechadas=osMes.filter(function(o){return o.status==="Fechado";});
        pts.sla=totalOS>0?Math.round(((fechadas.length+(abertas.length-vencidas.length))/totalOS)*100):100;
        var mapReinc={};

        return {sup,pts,nota,pior:pior||"—"};

        var prevC=preventivas.filter(function(p){if(p.status!=="Concluída")return false;var dataRef=p.devolucao||p.retorno||"";if(!dataRef)return false;var d=dataRef.split("-");return parseInt(d[1])===mesNum&&parseInt(d[0])===anoNum;});

          var dataRef=prev.retorno||prev.devolucao;var ret=new Date(dataRef);var tresM=new Date(ret);tresM.setMonth(tresM.getMonth()+3);
          return os.filter(function(o){if(!o.data||!o.cond)return false;var d=new Date(o.data);return (o.cond||"").toLowerCase().includes((prev.cond||"").toLowerCase().slice(0,8))&&d>=ret&&d<=tresM;}).length===0;
        });

        var mapRP={};
        osMes.forEach(function(o){var k=(o.cond||"")+"||"+(o.prob||"");if(!mapRP[k])mapRP[k]=0;mapRP[k]++;});
        var qtdRP=Object.values(mapRP).filter(function(v){return v>=2;}).length;
        var totalGP=Object.keys(mapRP).length||1;
        pts.recorrenciaPrev=Math.round(Math.max(0,((totalGP-qtdRP)/totalGP)*100));
        pts.prazo=null;pts.qualidade=null;pts.sla=null;pts.recorrencia=null;
        var nota=Math.round(pts.metaPrev*0.40+pts.qualPrev*0.40+pts.recorrenciaPrev*0.20);
        if(pts.metaPrev<piorVal){piorVal=pts.metaPrev;pior="Meta Preventiva";}
        if(pts.qualPrev<piorVal){piorVal=pts.qualPrev;pior="Qualidade Pós-Preventiva";}
        return {sup,pts,nota,pior:pior||"—",qtdPrev:prevC.length,semOSPrev:semOSP.length,totalPrev:prevD.length};
      }
      return {sup,pts:{},nota:0,pior:"—"};

function Problemas(){
  const [os,setOs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [mesSel,setMesSel]=useState(String(new Date().getMonth()+1).padStart(2,"0"));
  const [anoSel,setAnoSel]=useState(String(new Date().getFullYear()));
  const {tick}=React.useContext(RefreshCtx);
  const MESES_N=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:rows}=await sb.from("os").select("num,data,cond,tec,prob,status,pri");
    setOs(rows||[]);setLoading(false);
  },[]);
  useEffect(()=>{load();},[load,tick]);

  const filtered=useMemo(()=>{
    return os.filter(d=>{
      if(!d.data)return false;
      const[ano,mes]=d.data.split("-");
      return (!mesSel||mes===mesSel)&&(!anoSel||ano===anoSel);
    });
  },[os,mesSel,anoSel]);

  const anos=useMemo(()=>[...new Set(os.map(d=>d.data?.slice(0,4)).filter(Boolean))].sort().reverse(),[os]);

  // Agrupar por problema
  const porProblema=useMemo(()=>{
    const map={};
    filtered.forEach(d=>{
      const k=d.prob||"Sem descrição";
      if(!map[k])map[k]={prob:k,total:0,abertas:0,conds:new Set(),tecs:new Set()};
      map[k].total++;
      if(d.status==="Aberto")map[k].abertas++;
      if(d.cond)map[k].conds.add(d.cond);
      if(d.tec)map[k].tecs.add(d.tec);
    });
    return Object.values(map).sort((a,b)=>b.total-a.total).slice(0,20).map(d=>({...d,conds:d.conds.size,tecs:d.tecs.size}));
  },[filtered]);

  // Top condomínios com mais OS
  const topConds=useMemo(()=>{
    const map={};
    filtered.forEach(d=>{
      const k=d.cond||"—";
      if(!map[k])map[k]={cond:k,total:0,abertas:0};
      map[k].total++;
      if(d.status==="Aberto")map[k].abertas++;
    });
    return Object.values(map).sort((a,b)=>b.total-a.total).slice(0,10);
  },[filtered]);

  const maxPr=porProblema[0]?.total||1;
  const maxCo=topConds[0]?.total||1;

  return React.createElement("div",null,
    React.createElement("div",{style:{background:C.surface,padding:"16px 24px",position:"sticky",top:0,zIndex:10,borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:18,fontWeight:700}},"⚠ Análise de Problemas"),
        React.createElement("div",{style:{fontSize:12,color:C.muted}},"Top problemas e condomínios com mais OS")
      ),
      React.createElement("div",{style:{display:"flex",gap:8}},
        React.createElement("select",{style:{...base.sel,width:140},value:mesSel,onChange:e=>setMesSel(e.target.value)},
          React.createElement("option",{value:""},"Todos meses"),
          ...MESES_N.map((m,i)=>React.createElement("option",{key:m,value:String(i+1).padStart(2,"0")},m))
        ),
        React.createElement("select",{style:{...base.sel,width:90},value:anoSel,onChange:e=>setAnoSel(e.target.value)},
          React.createElement("option",{value:""},"Todos anos"),
          ...anos.map(a=>React.createElement("option",{key:a,value:a},a))
        )
      )
    ),
    React.createElement("div",{style:{padding:"20px 24px"}},
      React.createElement(Grid,{cols:3,mb:16},
        React.createElement(KPI,{label:"Total OS no período",value:filtered.length,color:C.blue}),
        React.createElement(KPI,{label:"🔴 Abertas",value:filtered.filter(d=>d.status==="Aberto").length,color:C.red}),
        React.createElement(KPI,{label:"Tipos de problema",value:porProblema.length,color:C.purple})
      ),
      loading?React.createElement("div",{style:{textAlign:"center",padding:40,color:C.muted}},"Carregando..."):
      React.createElement(Grid,{cols:2,mb:0},
        React.createElement(Card,null,
          React.createElement(CardHeader,{title:"📊 Top Problemas"}),
          porProblema.length===0?React.createElement("div",{style:{textAlign:"center",padding:20,color:C.dim}},"Sem dados"):
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
            porProblema.map((d,i)=>React.createElement("div",{key:i},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                React.createElement("span",{style:{fontSize:11,flex:1,marginRight:8,lineHeight:1.4}},d.prob),
                React.createElement("span",{style:{fontSize:11,fontWeight:700,color:C.orange,whiteSpace:"nowrap"}},d.total+" OS")
              ),
              React.createElement("div",{style:{width:"100%",height:6,background:C.border,borderRadius:3,overflow:"hidden"}},
                React.createElement("div",{style:{width:(d.total/maxPr*100)+"%",height:"100%",background:`linear-gradient(90deg,${C.orange},${C.red})`,borderRadius:3}})
              ),
              React.createElement("div",{style:{fontSize:10,color:C.dim,marginTop:2}},`${d.conds} cond · ${d.tecs} técn · ${d.abertas} abertas`)
            ))
          )
        ),
        React.createElement(Card,null,
          React.createElement(CardHeader,{title:"🏢 Top Condomínios com Mais OS"}),
          topConds.length===0?React.createElement("div",{style:{textAlign:"center",padding:20,color:C.dim}},"Sem dados"):
          React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
            topConds.map((d,i)=>React.createElement("div",{key:i},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                React.createElement("span",{style:{fontSize:11,flex:1,marginRight:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},d.cond),
                React.createElement("span",{style:{fontSize:11,fontWeight:700,color:C.blue,whiteSpace:"nowrap"}},d.total+" OS")
              ),
              React.createElement("div",{style:{width:"100%",height:6,background:C.border,borderRadius:3,overflow:"hidden"}},
                React.createElement("div",{style:{width:(d.total/maxCo*100)+"%",height:"100%",background:`linear-gradient(90deg,${C.blue},${C.cyan})`,borderRadius:3}})
              ),
              d.abertas>0&&React.createElement("div",{style:{fontSize:10,color:C.red,marginTop:2}},d.abertas+" abertas")
            ))
          )
        )
      )
    )
  );
}

// ── FOTO CARD ORGANOGRAMA ─────────────────────────────────────
function OrgFotoCard({fotoKey,nome,cor,size}){
  var sz=size||52;
  var [foto,setFoto]=useState(function(){try{return localStorage.getItem("org_foto_"+fotoKey)||"";}catch(e){return "";}});
  var inputId="foto-org-"+fotoKey;
  function handleFoto(e){
    var file=e.target.files[0];if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){setFoto(ev.target.result);try{localStorage.setItem("org_foto_"+fotoKey,ev.target.result);}catch(e){}};
    r.readAsDataURL(file);
  }
  return React.createElement("div",{style:{position:"relative",width:sz,height:sz,margin:"0 auto"}},
    foto
      ?React.createElement("img",{src:foto,style:{width:sz,height:sz,borderRadius:"50%",objectFit:"cover",border:"2px solid "+cor.border}})
      :React.createElement("div",{style:{width:sz,height:sz,borderRadius:"50%",background:cor.badge,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.38,border:"2px solid "+cor.border,color:cor.text,fontWeight:700}},nome?nome[0].toUpperCase():"?"),
    React.createElement("label",{htmlFor:inputId,style:{position:"absolute",bottom:0,right:0,width:18,height:18,borderRadius:"50%",background:cor.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,border:"2px solid #0a0f1e"}},"📷"),
    React.createElement("input",{type:"file",accept:"image/*",id:inputId,style:{display:"none"},onChange:handleFoto})
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function Login({onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [primeiroAcesso,setPrimeiroAcesso]=useState(null);
  const [novaSenha,setNovaSenha]=useState("");
  const [novaSenha2,setNovaSenha2]=useState("");
  const [tentativas,setTentativas]=useState(0);
  const [bloqueadoAte,setBloqueadoAte]=useState(0);
  const submit=async()=>{
    // Bloqueio após 5 tentativas falhas
    if(bloqueadoAte>Date.now()){
      var seg=Math.ceil((bloqueadoAte-Date.now())/1000);
      setErr("Muitas tentativas. Aguarde "+seg+" segundos.");return;
    }
    if(!user.trim()||!pass.trim()){setErr("Preencha usuário e senha");return;}
    setLoading(true);setErr("");
    try{
      const{data:rows}=await sb.from("usuarios").select("*").eq("nome",user.trim()).eq("ativo",true);
      // Mensagem genérica — não revela se o usuário existe
      var falhou=false;var u=null;
      if(!rows||rows.length===0){falhou=true;}
      else{
        u=rows[0];
        var ok=await servisVerificarSenha(pass,u.senha);
        if(!ok)falhou=true;
      }
      if(falhou){
        var novasTent=tentativas+1;
        setTentativas(novasTent);
        if(novasTent>=5){
          setBloqueadoAte(Date.now()+60*1000); // bloqueia 60s
          setTentativas(0);
          setErr("Muitas tentativas falhas. Acesso bloqueado por 60 segundos.");
        }else{
          setErr("Usuário ou senha incorretos ("+novasTent+"/5)");
        }
        setLoading(false);return;
      }
      // Login OK — resetar tentativas
      setTentativas(0);
      // Migrar senha antiga (texto plano) para hash automaticamente
      if(String(u.senha).indexOf("h$")!==0){
        var h=await servisHashSenha(pass);
        sb.from("usuarios").update({senha:h}).eq("id",u.id);
      }
      if(u.primeiro_acesso){setPrimeiroAcesso(u);setLoading(false);return;}
      servisAudit("login","usuarios",u.id,{nome:u.nome},"Login realizado");
      onLogin({nome:u.nome,nivel:u.nivel,id:u.id});
    }catch(e){setErr("Erro ao conectar. Tente novamente.");}
    setLoading(false);
  };
  const definirSenha=async()=>{
    var valErro=servisValidarSenha(novaSenha);
    if(valErro){setErr(valErro);return;}
    if(novaSenha!==novaSenha2){setErr("As senhas não conferem");return;}
    setLoading(true);setErr("");
    var h=await servisHashSenha(novaSenha);
    await sb.from("usuarios").update({senha:h,primeiro_acesso:false}).eq("id",primeiroAcesso.id);
    servisAudit("definir_senha","usuarios",primeiroAcesso.id,{nome:primeiroAcesso.nome},"Primeira senha definida");
    onLogin({nome:primeiroAcesso.nome,nivel:primeiroAcesso.nivel,id:primeiroAcesso.id});
    setLoading(false);
  };
  if(primeiroAcesso)return React.createElement("div",{style:{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement("div",{style:{background:C.surface,border:`1px solid ${C.borderL}`,borderRadius:16,padding:36,width:380,zIndex:1}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:24}},
        React.createElement("div",{style:{background:"linear-gradient(160deg,#0d1f3c,#1a3a6b)",borderRadius:14,padding:"14px 20px",display:"inline-block",boxShadow:"0 6px 24px rgba(249,115,22,0.2)",marginBottom:4}},
          React.createElement("img",{src:LOGO_SERVIS,style:{width:170,height:"auto",display:"block"}})),
        React.createElement("div",{style:{width:60,height:2,background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",margin:"6px auto 0"}}),
        React.createElement("div",{style:{marginTop:12,background:C.blue+"22",border:`1px solid ${C.blue}44`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.blue}},"Primeiro acesso! Defina sua senha pessoal.")
      ),
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("label",{style:base.lbl},"Nova senha *"),
        React.createElement("input",{type:"password",style:base.inp,value:novaSenha,onChange:e=>setNovaSenha(e.target.value),placeholder:"Minimo 4 caracteres"})
      ),
      React.createElement("div",{style:{marginBottom:16}},
        React.createElement("label",{style:base.lbl},"Confirmar senha *"),
        React.createElement("input",{type:"password",style:base.inp,value:novaSenha2,onChange:e=>setNovaSenha2(e.target.value),onKeyDown:e=>e.key==="Enter"&&definirSenha(),placeholder:"Repita a senha"})
      ),
      err&&React.createElement("div",{style:{color:C.red,fontSize:12,marginBottom:12,textAlign:"center"}},err),
      React.createElement("button",{style:{...btnStyle(C.blue),width:"100%",padding:"10px",fontSize:15,fontWeight:600},onClick:definirSenha,disabled:loading},
        loading?React.createElement("span",{className:"spin"},"⟳"):"Definir senha e entrar"
      )
    )
  );
  return React.createElement("div",{style:{height:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}},
    React.createElement("svg",{style:{position:"absolute",inset:0,opacity:0.03},width:"100%",height:"100%"},
      React.createElement("defs",null,React.createElement("pattern",{id:"grid",width:40,height:40,patternUnits:"userSpaceOnUse"},React.createElement("path",{d:"M 40 0 L 0 0 0 40",fill:"none",stroke:C.blue,strokeWidth:1}))),
      React.createElement("rect",{width:"100%",height:"100%",fill:"url(#grid)"})
    ),
    React.createElement("div",{style:{position:"absolute",inset:0,background:`radial-gradient(circle at 20% 50%,${C.blue}11 0,transparent 60%),radial-gradient(circle at 80% 20%,${C.purple}11 0,transparent 50%)`}}),
    React.createElement("div",{style:{background:C.surface,border:`1px solid ${C.borderL}`,borderRadius:16,padding:36,width:380,position:"relative",zIndex:1}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:28}},
        React.createElement("div",{style:{background:"linear-gradient(160deg,#0d1f3c,#1a3a6b)",borderRadius:14,padding:"14px 20px",display:"inline-block",boxShadow:"0 6px 24px rgba(249,115,22,0.2)",marginBottom:4}},
          React.createElement("img",{src:LOGO_SERVIS,style:{width:170,height:"auto",display:"block"}})),
        React.createElement("div",{style:{width:60,height:2,background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",margin:"6px auto 0"}})
      ),
      React.createElement("div",{style:{marginBottom:14}},
        React.createElement("label",{style:base.lbl},"Usuário"),
        React.createElement("div",{style:{position:"relative"}},
          React.createElement("span",{style:{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:14}},"👤"),
          React.createElement("input",{style:{...base.inp,paddingLeft:30},value:user,onChange:e=>setUser(e.target.value),onKeyDown:e=>e.key==="Enter"&&submit(),placeholder:"usuário"})

        React.createElement("label",{style:base.lbl},"Senha"),

          React.createElement("input",{style:{...base.inp,paddingLeft:30,paddingRight:36},type:showPass?"text":"password",value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==="Enter"&&submit(),placeholder:"senha"}),
          React.createElement("button",{style:{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",cursor:"pointer",fontSize:16},onClick:()=>setShowPass(p=>!p)},showPass?"🙈":"👁")

    var [rosRes,prevRes,tecRes,condRes]=await Promise.all([

    var os=rosRes.data||[];
    var prevs=prevRes.data||[];

    var osMes=os.filter(function(o){return (o.data||"").slice(5,7)===mesAtual;});
    var osAb=os.filter(function(o){return o.status==="Aberto";});
    var slaVenc=osAb.filter(function(o){return (hoje-new Date(o.data))>72*3600000;});

    // Mapas
    var condOsMap={};
    os.forEach(function(o){if(o.cond){if(!condOsMap[o.cond])condOsMap[o.cond]={total:0,abertas:0,fech:0,probs:[]};condOsMap[o.cond].total++;if(o.status==="Aberto")condOsMap[o.cond].abertas++;else condOsMap[o.cond].fech++;if(o.prob)condOsMap[o.cond].probs.push(o.prob);}});

    var condOsMes={};
    osMes.forEach(function(o){if(o.cond)condOsMes[o.cond]=(condOsMes[o.cond]||0)+1;});

    var tecMap={};
    os.forEach(function(o){if(!o.tec)return;if(!tecMap[o.tec])tecMap[o.tec]={total:0,fech:0,ab:0};tecMap[o.tec].total++;if(o.status==="Fechado")tecMap[o.tec].fech++;else tecMap[o.tec].ab++;});

    var probMap={};

      var c=conds.find(function(x){return x.nome===p.cond;});
      if(c&&c.area_tecnico&&m[c.area_tecnico])m[c.area_tecnico].prevs++;

// ── PRODUTIVIDADE DIÁRIA ────────────────────────────────────
function ProdutividadeDiaria({usuario}){
  const {tick,refresh}=React.useContext(RefreshCtx);
  const [dados,setDados]=useState(null);
  const [loading,setLoading]=useState(true);
  const [agora,setAgora]=useState(new Date());
  const [tecSel,setTecSel]=useState(null);

  const hoje=new Date();
  const [filtData,setFiltData]=useState(todayStr());
  const hojeStr=filtData;
  const diaLabel=new Date(filtData+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  var hojeLabel=diaLabel;
  var isHoje=filtData===todayStr();

  // Atualizar relógio a cada minuto
  useEffect(function(){
    var t=setInterval(function(){setAgora(new Date());},60000);
    return function(){clearInterval(t);};
  },[]);

  const load=useCallback(async function(){
    setLoading(true);
    var [rTec,rOs,rLoc,rPrev]=await Promise.all([
      sb.from("tecnicos").select("id,nome,mat,status,foto_url").order("nome"),
      sb.from("os").select("num,data,status,cond,tec,prob,data_fechamento").eq("data",filtData),
      sb.from("tecnicos_localizacao").select("*").order("atualizado_em",{ascending:false}),
      sb.from("preventivas").select("id,cond,tecnico,status,primeira_visita").eq("primeira_visita",hojeStr),
    ]);

    var tecs=rTec.data||[];
    var osHoje=rOs.data||[];
    var locs=rLoc.data||[];
    var prevHoje=rPrev.data||[];

    // Mapa de localização por técnico
    var locMap={};
    locs.forEach(function(l){locMap[l.tec]=l;});

    // OS fechadas hoje (data_fechamento = hoje)
    var [rFech]=await Promise.all([
      sb.from("os").select("num,cond,tec,data_fechamento,prob").eq("data_fechamento",filtData),
    ]);
    var fechHoje=rFech.data||[];

    // Enriquecer técnicos
    var tecsData=tecs.map(function(t){
      var loc=locMap[t.nome]||locMap[t.mat]||null;
      var osAbertas=osHoje.filter(function(o){return o.tec===t.nome&&o.status==="Aberto";});
      var osFech=fechHoje.filter(function(o){return o.tec===t.nome;});
      var prevTec=prevHoje.filter(function(p){return p.tecnico===t.nome;});
      var emCampo=loc&&loc.status_campo==="em_campo";
      var ultimaAtt=loc?new Date(loc.atualizado_em):null;
      var minAtras=ultimaAtt?Math.round((agora-ultimaAtt)/60000):null;
      return {
        ...t,loc,osAbertas,osFech,prevTec,
        emCampo,minAtras,
        status_display:emCampo?"🟢 Em campo":t.status==="Inativo"?"⚫ Inativo":"🔵 Disponível",
      };
    }).filter(function(t){return t.status!=="Inativo";});

    setDados({
      tecs:tecsData,
      osHoje,fechHoje,prevHoje,
      emCampo:tecsData.filter(function(t){return t.emCampo;}).length,
      disponiveis:tecsData.filter(function(t){return !t.emCampo;}).length,
      osFechadasHoje:fechHoje.length,
      osAbertasHoje:osHoje.filter(function(o){return o.status==="Aberto";}).length,
      prevHoje:prevHoje.length,
      prevConclHoje:prevHoje.filter(function(p){return p.status==="Concluída";}).length,
    });
    setLoading(false);

    function registrarAtividade(){ultimaAtividade.current=Date.now();}

      if(Date.now()-ultimaAtividade.current>30*60*1000){
        setUsuario(null);
        alert("Sessão encerrada por inatividade. Faça login novamente.");

      clearInterval(checador);

            React.createElement("div",{style:{width:24,height:24,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}},usuario.nome[0].toUpperCase()),
