// Horário de Brasília (UTC-3)
function nowBrasilia(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
}
function isoNowBrasilia(){
  const d=nowBrasilia();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+"T"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0")+".000Z";
}
function todayBrasilia(){
  const d=nowBrasilia();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmtBrasilia(iso){
  if(!iso)return"";
  return new Date(iso).toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"});
}
function fmtTimeBrasilia(iso){
  if(!iso)return"";
  return new Date(iso).toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo"});
}

function fmt(d){if(!d)return"";const[y,m,di]=d.split("-");return`${di}/${m}/${y}`;}

function priCor(p){return p==="Alta"?C.red:p==="Média"?C.yellow:C.green;}
function priIcon(p){return p==="Alta"?"🔴":p==="Média"?"🟡":"🟢";}

function calcHorasUteis(data){
  if(!data)return 0;
  const start=new Date(data+"T08:00:00");
  const end=new Date();
  if(end<=start)return 0;
  let h=0;const cur=new Date(start);
  while(cur<end){
    const dow=cur.getDay();
    if(dow!==0&&dow!==6){
      const ini=new Date(cur);ini.setHours(8,0,0,0);
      const fim=new Date(cur);fim.setHours(18,0,0,0);
      const s=cur<ini?ini:cur;const e=end<fim?end:fim;
      if(e>s)h+=(e-s)/3600000;
    }
    cur.setDate(cur.getDate()+1);cur.setHours(8,0,0,0);
  }
  return Math.round(h);
}

function getSLAStatus(os){
  if(os.status==="Fechado")return null;
  const h=calcHorasUteis(os.data);
  if(h>48)return{label:"⚠ SLA VENCIDO",cor:C.red,horas:h};
  if(h>36)return{label:"⏳ Vencendo",cor:C.orange,horas:h};
  return{label:`${h}h decorridas`,cor:C.green,horas:h};
}

function getGPS(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res({lat:null,lng:null});
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
      ()=>res({lat:null,lng:null}),{timeout:6000}
    );
  });
}

  const [verTodasAreas,setVerTodasAreas]=useState(true);
  const [minhasAreas,setMinhasAreas]=useState([]);
  const [todosCondsArea,setTodosCondsArea]=useState(new Set());

  const load=useCallback(async()=>{
    setLoading(true);
    const[{data:os},{data:conds},{data:campo}]=await Promise.all([
      sb.from("os").select("*").eq("status","Aberto").order("data",{ascending:true}),
      sb.from("condominios").select("nome,endereco,area_tecnico,tecnico"),
      sb.from("os_campo").select("*")
    ]);

    const nomeTec=(usuario?.nome||"").toLowerCase().trim();

    // 1. Descobrir a área ÚNICA do técnico (P16, P17, P18 ou P19)
    // A área vem do campo area_tecnico do condomínio onde o técnico está cadastrado
    let areaDoTec="";
    for(const c of (conds||[])){
      const area=(c.area_tecnico||"").trim();
      const tec=(c.tecnico||"").toLowerCase().trim();
      if(area&&nomeTec&&tec===nomeTec){
        areaDoTec=area; // P16, P17, P18 ou P19
        break;
      }
    }

    // 2. Todos os condomínios daquela área específica
    const condsDaArea=new Set();
    if(areaDoTec){
      (conds||[]).forEach(c=>{
        if((c.area_tecnico||"").trim()===areaDoTec){
          condsDaArea.add((c.nome||"").toLowerCase());
        }
      });
    }

    setMinhasAreas(areaDoTec?[areaDoTec]:[]);
    setTodosCondsArea(condsDaArea);

    // Mapa de endereços
    const cm={};
    (conds||[]).forEach(c=>{if(c.nome)cm[c.nome.toLowerCase()]=c.endereco||"";});
    function findEnd(nome){
      if(!nome)return"";
      const ex=cm[nome.toLowerCase()];if(ex)return ex;
      const k=Object.keys(cm).find(function(m){return nome.toLowerCase().startsWith(m.slice(0,8))||m.startsWith(nome.toLowerCase().slice(0,8));});
      return k?cm[k]:"";
    }
    // Mapa de campo
    const fm={};
    (campo||[]).forEach(c=>{fm[c.num]=c;});

    // 3. Marcar _minha em todas as OS e filtrar conforme verTodasAreas
    const todasOS=(os||[]).map(o=>({
      ...o,
      endereco:findEnd(o.cond),
      campo:fm[o.num]||null,
      _minha:condsDaArea.size>0?condsDaArea.has((o.cond||"").toLowerCase()):true
    }));
    const osFiltradas=(!verTodasAreas&&condsDaArea.size>0)
      ?todasOS.filter(o=>o._minha)
      :todasOS;
    const merged=osFiltradas;
    // Ordenar: SLA vencida > Alta prioridade > demais por horas decorridas
    merged.sort((a,b)=>{
      const ha=calcHorasUteis(a.data);const hb=calcHorasUteis(b.data);
      const va=ha>48?2:a.pri==="Alta"?1:0;
      const vb=hb>48?2:b.pri==="Alta"?1:0;
      if(vb!==va)return vb-va;
      return hb-ha;
    });
    setCondMap(cm);setCampoMap(fm);setOsList(merged);setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{
    const t=setInterval(load,30000);
    const onFocus=()=>load();

    document.addEventListener("visibilitychange",()=>{if(!document.hidden)load();});
    return()=>{clearInterval(t);window.removeEventListener("focus",onFocus);};
  },[load]);

  // Atualizar localização
  useEffect(()=>{
    if(!navigator.geolocation)return;
    const update=pos=>{
      sb.from("tecnicos_localizacao").upsert({
        id:"loc_"+usuario.nome.replace(/\s+/g,"_"),

  // "Minhas" = OS com o nome do técnico OU OS abertas hoje na área dele

  const vencidas=osList.filter(o=>calcHorasUteis(o.data)>48);

  const areaLabel=minhasAreas.length>0?minhasAreas[0]:"Área";
  const listMap={"minhas":minhas,"area":daArea,"todas":osList,"em-campo":emCampo,"vencidas":vencidas};
  const lista=listMap[filtro]||daArea;

  const kpis=[
    {id:"minhas",icon:"👤",label:"Minhas",val:minhas.length,c:C.blue},
    {id:"area",icon:"📍",label:areaLabel,val:daArea.length,c:C.cyan},

  return React.createElement("div",{style:{paddingBottom:80}},
    // Header
    React.createElement("div",{style:{background:C.surface,padding:"16px 16px 0",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:10}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:16,fontWeight:700}},"Ordens de Serviço"),
          React.createElement("div",{style:{fontSize:11,color:C.muted}},
            minhasAreas.length>0?"Área: "+minhasAreas[0]:"Ordenadas por urgência"

            onClick:function(){setVerTodasAreas(function(v){return !v;});setTimeout(load,50);}

              React.createElement("a",{href:"https://waze.com/ul?ll="+loc.lat+","+loc.lng+"&navigate=yes",target:"_blank",style:{flex:1,display:"block",background:C.cyan+"22",border:"1px solid "+C.cyan+"33",borderRadius:8,padding:"6px",textAlign:"center",color:C.cyan,fontSize:11,fontWeight:600,textDecoration:"none"}},"🔵 Waze")
            )
          );
        })
      ),
      // Disponíveis
      disp.length>0&&React.createElement("div",{style:{marginTop:16}},
        React.createElement("div",{style:{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8,letterSpacing:1}},"DISPONÍVEIS"),
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          disp.map((loc,i)=>React.createElement("div",{key:i,style:{...card,padding:12,margin:0}},
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
              React.createElement("div",{style:{width:32,height:32,borderRadius:"50%",background:C.green+"22",border:"2px solid "+C.green,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"🟢"),
              React.createElement("div",null,

// ── DETALHE DA OS ───────────────────────────────────────────
function DetalheOS({os,usuario,onBack}){
  const [campo,setCampo]=useState(os.campo||null);
  const [historico,setHistorico]=useState([]);
  const [aba,setAba]=useState("atend");
  const [loading,setLoading]=useState(false);
  const [fotos,setFotos]=useState([]);
  const [problema,setProblema]=useState(os.campo?.problema||"");
  const [solucao,setSolucao]=useState(os.campo?.solucao||"");
  const [material,setMaterial]=useState(os.campo?.material||"");
  const [msg,setMsg]=useState("");

  const STATUS_ORDER=["Aguardando","A Caminho","No Local","Em Atendimento","Concluído"];
  const statusAtual=campo?.status_campo||"Aguardando";
  const idxAtual=STATUS_ORDER.indexOf(statusAtual);

  useEffect(()=>{
    // Histórico das últimas OS do condomínio
    sb.from("os").select("num,data,prob,status,relato,data_fechamento")
      .eq("cond",os.cond).neq("id",os.id)
      .order("data",{ascending:false}).limit(5)
      .then(({data})=>setHistorico(data||[]));
  },[os.cond,os.id]);

  // GPS contínuo durante atendimento
  useEffect(()=>{
    if(!campo||campo.status_campo==="Aguardando"||campo.status_campo==="Concluído")return;
    const watcher=navigator.geolocation?.watchPosition(pos=>{
      sb.from("tecnicos_localizacao").upsert({
        id:"loc_"+usuario.nome.replace(/\s+/g,"_"),
        tec:usuario.nome,lat:pos.coords.latitude,lng:pos.coords.longitude,
        status_campo:campo.status_campo,os_num:os.num,os_cond:os.cond,
        atualizado_em:isoNowBrasilia()
      },{onConflict:"tec"});
    },null,{enableHighAccuracy:true,maximumAge:15000});
    const t=setInterval(()=>navigator.geolocation?.getCurrentPosition(pos=>{
      sb.from("tecnicos_localizacao").upsert({
        id:"loc_"+usuario.nome.replace(/\s+/g,"_"),
        tec:usuario.nome,lat:pos.coords.latitude,lng:pos.coords.longitude,
        status_campo:campo.status_campo,os_num:os.num,os_cond:os.cond,
        atualizado_em:isoNowBrasilia()
      },{onConflict:"tec"});
    }),30000);
    return()=>{if(watcher)navigator.geolocation?.clearWatch(watcher);clearInterval(t);};
  },[campo?.status_campo,usuario.nome,os.num,os.cond]);

  async function avancar(){
    const prox=STATUS_ORDER[idxAtual+1];if(!prox)return;
    if(prox==="Concluído"){
      if(!problema.trim()){setMsg("⚠ Descreva o problema encontrado");return;}
      if(!solucao.trim()){setMsg("⚠ Descreva a solução aplicada");return;}
    }
    setLoading(true);setMsg("");
    const gps=await getGPS();
    const agora=isoNowBrasilia();
    const upd={status_campo:prox,tec:usuario.nome,num:os.num,problema,solucao,material};
    if(prox==="A Caminho"){upd.dt_deslocamento=agora;upd.lat_deslocamento=gps.lat;upd.lng_deslocamento=gps.lng;}
    if(prox==="No Local"){upd.dt_chegada=agora;upd.lat_chegada=gps.lat;upd.lng_chegada=gps.lng;}
    if(prox==="Em Atendimento")upd.dt_inicio_atend=agora;
    if(prox==="Concluído"){
      upd.dt_conclusao=agora;upd.lat_conclusao=gps.lat;upd.lng_conclusao=gps.lng;
      if(fotos[0])upd.foto_url=fotos[0];
      if(fotos[1])upd.foto2_url=fotos[1];
      if(fotos[2])upd.foto3_url=fotos[2];
      await sb.from("os").update({status:"Fechado",relato:problema,data_fechamento:isoNowBrasilia().split("T")[0]}).eq("num",os.num);
    }
    let newCampo;
    if(campo?.id){const{data}=await sb.from("os_campo").update(upd).eq("id",campo.id).select().single();newCampo=data;}
    else{const{data}=await sb.from("os_campo").insert({...upd,id:"oc_"+Date.now()}).select().single();newCampo=data;}
    setCampo(newCampo);setLoading(false);
    if(prox==="Concluído")setMsg("✅ OS concluída com sucesso!");
  }

  function handleFoto(e){
    Array.from(e.target.files).slice(0,3-fotos.length).forEach(file=>{
      const r=new FileReader();r.onload=ev=>setFotos(p=>[...p,ev.target.result].slice(0,3));r.readAsDataURL(file);
    });
  }

  const btnNext={
    "Aguardando":{label:"🚗  Iniciar Deslocamento",bg:C.blue},
    "A Caminho":{label:"📍  Cheguei ao Condomínio",bg:C.yellow},
    "No Local":{label:"🔧  Iniciar Atendimento",bg:C.orange},
    "Em Atendimento":{label:"✅  Concluir Atendimento",bg:C.green},
  }[statusAtual];

  const sla=getSLAStatus(os);
  const statusCors={"Aguardando":C.dim,"A Caminho":C.yellow,"No Local":C.cyan,"Em Atendimento":C.orange,"Concluído":C.green};

  return React.createElement("div",{style:{minHeight:"100vh",paddingBottom:30}},
    // Header
    React.createElement("div",{style:{background:C.surface,borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:10}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"12px 16px"}},
        React.createElement("button",{style:{background:"none",border:"none",color:C.text,fontSize:24,cursor:"pointer",padding:4},onClick:onBack},"‹"),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{fontSize:16,fontWeight:700,color:C.cyan}},"OS #"+os.num),
          React.createElement("div",{style:{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},os.cond)
        ),
        sla&&React.createElement(Badge,{label:sla.label,cor:sla.cor,small:true})
      ),
      // Progress bar
      React.createElement("div",{style:{display:"flex",padding:"0 16px 12px",gap:4}},
        STATUS_ORDER.map((s,i)=>React.createElement("div",{key:s,style:{
          flex:1,height:4,borderRadius:2,
          background:i<=idxAtual?statusCors[s]||C.blue:C.border,
          transition:"background .3s"
        }})
        )
      ),
      // Sub abas
      React.createElement("div",{style:{display:"flex",borderTop:"1px solid "+C.border}},
        [{id:"atend",label:"Atendimento"},{id:"info",label:"Detalhes"},{id:"hist",label:"Histórico"}].map(t=>
          React.createElement("button",{key:t.id,
            style:{flex:1,padding:"10px",background:"none",border:"none",cursor:"pointer",
              fontSize:12,fontWeight:600,color:aba===t.id?C.blue:C.muted,
              borderBottom:"2px solid "+(aba===t.id?C.blue:"transparent"),transition:"all .2s"
            },onClick:()=>setAba(t.id)},t.label
          )
        )
      )
    ),

    React.createElement("div",{style:{padding:"16px"}},
      // ── ABA ATENDIMENTO ──
      aba==="atend"&&React.createElement("div",null,
        // Status chips
        React.createElement("div",{style:{display:"flex",gap:6,marginBottom:16,overflowX:"auto"}},
          STATUS_ORDER.map((s,i)=>React.createElement("div",{key:s,style:{
            flexShrink:0,padding:"4px 10px",borderRadius:10,fontSize:10,fontWeight:600,
            background:i<=idxAtual?(statusCors[s]||C.blue)+"22":"transparent",
            color:i<=idxAtual?statusCors[s]||C.blue:C.dim,
            border:"1px solid "+(i<=idxAtual?(statusCors[s]||C.blue)+"44":C.border)
          }},
            (i<idxAtual?"✓ ":i===idxAtual?"● ":"")+s
          ))
        ),
        // Timeline horários
        campo&&[["🚗 Deslocamento",campo.dt_deslocamento],["📍 Chegada",campo.dt_chegada],["🔧 Início",campo.dt_inicio_atend],["✅ Conclusão",campo.dt_conclusao]].filter(([,v])=>v).length>0&&
        React.createElement("div",{style:{...card,marginBottom:12}},
          React.createElement("div",{style:{fontSize:12,fontWeight:700,color:C.cyan,marginBottom:10}},"⏱ Registro de Tempo"),
          [["🚗 Deslocamento",campo.dt_deslocamento],["📍 Chegada",campo.dt_chegada],["🔧 Início",campo.dt_inicio_atend],["✅ Conclusão",campo.dt_conclusao]].filter(([,v])=>v).map(([l,v],i)=>
            React.createElement("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid "+C.border,fontSize:12}},
              React.createElement("span",{style:{color:C.muted}},l),
              React.createElement("span",{style:{fontWeight:600}},fmtTimeBrasilia(v))
            )
          )
        ),
        // Relatório técnico (apenas quando em atendimento)
        idxAtual>=2&&statusAtual!=="Concluído"&&React.createElement("div",{style:{...card}},
          React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.orange,marginBottom:12}},"📝 Relatório Técnico"),
          React.createElement("textarea",{style:{...inp,minHeight:80,resize:"vertical"},placeholder:"Problema encontrado *",value:problema,onChange:e=>setProblema(e.target.value)}),
          React.createElement("textarea",{style:{...inp,minHeight:80,resize:"vertical",marginTop:8},placeholder:"Solução aplicada *",value:solucao,onChange:e=>setSolucao(e.target.value)}),
          React.createElement("textarea",{style:{...inp,minHeight:60,resize:"vertical",marginTop:8},placeholder:"Material utilizado",value:material,onChange:e=>setMaterial(e.target.value)})
        ),
        // Fotos
        idxAtual>=2&&statusAtual!=="Concluído"&&React.createElement("div",{style:{...card}},
          React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.purple,marginBottom:10}},"📸 Fotos (opcional)"),
          React.createElement("label",{htmlFor:"foto-input",style:{display:"block",background:C.surface,border:"2px dashed "+C.border,borderRadius:12,padding:"20px",textAlign:"center",cursor:"pointer",marginBottom:8}},
            React.createElement("div",{style:{fontSize:28,marginBottom:4}},"📷"),
            React.createElement("div",{style:{fontSize:12,color:C.muted}},"Toque para adicionar fotos")
          ),
          React.createElement("input",{type:"file",accept:"image/*",multiple:true,capture:"environment",id:"foto-input",style:{display:"none"},onChange:handleFoto}),
          fotos.length>0&&React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}},
            fotos.map((f,i)=>React.createElement("div",{key:i,style:{position:"relative"}},
              React.createElement("img",{src:f,style:{width:"100%",height:80,objectFit:"cover",borderRadius:8}}),
              React.createElement("button",{style:{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,cursor:"pointer"},onClick:()=>setFotos(p=>p.filter((_,j)=>j!==i))},"×")
            ))
          ),
          campo?.foto_url&&fotos.length===0&&React.createElement("div",{style:{color:C.green,fontSize:12}},"✅ Foto já registrada")
        ),
        // Mensagem
        msg&&React.createElement("div",{style:{background:msg.includes("✅")?C.green+"22":C.red+"22",border:"1px solid "+(msg.includes("✅")?C.green:C.red)+"44",borderRadius:12,padding:"12px 16px",marginBottom:12,fontSize:13,textAlign:"center",fontWeight:600}},msg),
        // Botão de ação
        btnNext&&statusAtual!=="Concluído"&&React.createElement("button",{
          style:{...btn(btnNext.bg),background:"linear-gradient(135deg,"+btnNext.bg+","+btnNext.bg+"bb)",boxShadow:"0 4px 20px "+btnNext.bg+"44",marginTop:8},
          onClick:avancar,disabled:loading
        },loading?React.createElement(Spinner):btnNext.label),
        statusAtual==="Concluído"&&React.createElement("div",{style:{background:C.green+"22",border:"1px solid "+C.green+"44",borderRadius:16,padding:24,textAlign:"center"}},
          React.createElement("div",{style:{fontSize:42,marginBottom:8}},"✅"),
          React.createElement("div",{style:{fontSize:16,fontWeight:700,color:C.green}},"OS Concluída!"),
          React.createElement("div",{style:{fontSize:12,color:C.muted,marginTop:4}},"Concluída em "+fmtBrasilia(campo.dt_conclusao))
        )
      ),

      // ── ABA DETALHES ──
      aba==="info"&&React.createElement("div",{style:{...card}},
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
          [["📋 Número","#"+os.num],["📅 Data",fmt(os.data)],["👷 Técnico",os.tec],["⚡ Prioridade",os.pri||"Média"]].map(([l,v],i)=>
            React.createElement("div",{key:i},React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:2}},l),React.createElement("div",{style:{fontSize:13,fontWeight:600}},v))
          )
        ),
        React.createElement("div",{style:{marginBottom:10}},
          React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:4}},"🔧 Problema"),
          React.createElement("div",{style:{fontSize:13,lineHeight:1.5,fontWeight:600}},os.prob)
        ),
        os.descricao&&React.createElement("div",{style:{background:C.yellow+"11",borderRadius:10,padding:"10px 12px",marginBottom:10,border:"1px solid "+C.yellow+"33"}},
          React.createElement("div",{style:{fontSize:10,color:C.yellow,marginBottom:4}},"📝 Descrição adicional"),
          React.createElement("div",{style:{fontSize:13,lineHeight:1.6,color:C.text}},os.descricao)
        ),
        os.endereco&&React.createElement("div",{style:{background:C.blue+"11",borderRadius:10,padding:"10px 12px"}},
          React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:4}},"📍 Endereço"),
          React.createElement("div",{style:{fontSize:13,color:C.blue,fontWeight:600,marginBottom:8}},os.endereco),
          React.createElement("div",{style:{display:"flex",gap:8}},
            React.createElement("a",{href:"https://maps.google.com/?q="+encodeURIComponent(os.endereco),target:"_blank",style:{flex:1,display:"block",background:C.blue+"22",border:"1px solid "+C.blue+"33",borderRadius:8,padding:"8px",textAlign:"center",color:C.blue,fontSize:12,fontWeight:600,textDecoration:"none"}},"🗺 Google Maps"),
            React.createElement("a",{href:"https://waze.com/ul?q="+encodeURIComponent(os.endereco),target:"_blank",style:{flex:1,display:"block",background:C.cyan+"22",border:"1px solid "+C.cyan+"33",borderRadius:8,padding:"8px",textAlign:"center",color:C.cyan,fontSize:12,fontWeight:600,textDecoration:"none"}},"🔵 Waze")
          )
        )
      ),

      // ── ABA HISTÓRICO ──
      aba==="hist"&&React.createElement("div",null,
        React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.muted,marginBottom:12}},"Últimas OS do condomínio:"),
        historico.length===0
          ?React.createElement("div",{style:{textAlign:"center",padding:40,color:C.dim}},"Nenhum histórico encontrado")
          :historico.map((h,i)=>React.createElement("div",{key:i,style:{...card}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
                React.createElement("span",{style:{color:C.cyan,fontWeight:700}},"#"+h.num),
                React.createElement("div",{style:{display:"flex",gap:6}},
                  React.createElement(Badge,{label:h.status,cor:h.status==="Fechado"?C.green:C.red,small:true}),
                  React.createElement("span",{style:{fontSize:11,color:C.dim}},fmt(h.data))
                )
              ),
              React.createElement("div",{style:{fontSize:13,fontWeight:600,marginBottom:6,color:C.text}},h.prob),
              h.relato
                ?React.createElement("div",{style:{background:C.surface,borderRadius:8,padding:"10px 12px",borderLeft:"3px solid "+C.blue}},
                    React.createElement("div",{style:{fontSize:10,color:C.blue,fontWeight:700,marginBottom:4}},"📝 Relato do Técnico"),
                    React.createElement("div",{style:{fontSize:12,color:C.muted,lineHeight:1.6}},h.relato)
                  )
                :React.createElement("div",{style:{fontSize:11,color:C.dim,fontStyle:"italic"}},"Sem relato registrado"),
              h.data_fechamento&&React.createElement("div",{style:{fontSize:10,color:C.green,marginTop:6}},"✅ Concluída em: "+fmt(h.data_fechamento))
            ))
      )
    )
  );
}

// ── APP PRINCIPAL ───────────────────────────────────────────
function App(){
  const [usuario,setUsuario]=useState(null);
  const [tab,setTab]=useState("os");
  const [osSel,setOsSel]=useState(null);

  useEffect(()=>{
    const u=sessionStorage.getItem("servis_user");
    if(u)try{setUsuario(JSON.parse(u));}catch(e){}
  },[]);

  function logout(){setUsuario(null);setOsSel(null);sessionStorage.removeItem("servis_user");}

  if(!usuario)return React.createElement(Login,{onLogin:setUsuario});
  if(osSel)return React.createElement(DetalheOS,{os:osSel,usuario,onBack:()=>setOsSel(null)});

  const tabs=[
    {id:"os",icon:"📋",label:"OS"},
    {id:"campo",icon:"📡",label:"Em Campo"},
  ];

  return React.createElement("div",null,
    // Top bar
    React.createElement("div",{style:{background:C.surface,borderBottom:"1px solid "+C.border,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",position:"sticky",top:0,zIndex:20}},
      React.createElement("img",{src:LOGO,style:{height:32,objectFit:"contain"}}),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{textAlign:"right"}},
          React.createElement("div",{style:{fontSize:13,fontWeight:600}},usuario.nome),
          React.createElement("div",{style:{fontSize:10,color:C.green}},"● Online")
        ),
        React.createElement("button",{style:{background:C.red+"22",border:"1px solid "+C.red+"33",color:C.red,borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer"},onClick:logout},"Sair")
      )
    ),
    tab==="os"?React.createElement(MinhasOS,{usuario,onSelectOS:os=>{setOsSel({...os})}}):React.createElement(Andamento,{usuario}),
    React.createElement(BottomTab,{tabs,active:tab,onChange:setTab})
  );
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
