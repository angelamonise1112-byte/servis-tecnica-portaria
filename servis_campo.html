.spin{display:inline-block;animation:spin 1s linear infinite;}

@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

const {useState,useEffect,useCallback,useMemo}=React;
const SUPA_URL="https://qemqcpqkwlxkbckwwevv.supabase.co";
const SUPA_KEY="sb_publishable_TDgkeeJ4SICauVqBUDQ9ZQ_6lwT14lc";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── ESTILOS ────────────────────────────────────────────────────
const C={bg:"#0a0f1e",surface:"#0f172a",card:"#141c2e",border:"#1e2d45",
  blue:"#3b82f6",green:"#10b981",red:"#ef4444",yellow:"#f59e0b",
  orange:"#f97316",cyan:"#06b6d4",text:"#f0f6ff",muted:"#8ba3c7",dim:"#4a6080"};

function s(obj){return Object.entries(obj).map(([k,v])=>k.replace(/([A-Z])/g,m=>"-"+m.toLowerCase())+":"+v).join(";");}

// ── LOGIN ──────────────────────────────────────────────────────
function Login({onLogin}){
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showPass,setShowPass]=useState(false);
  const [primeiroAcesso,setPrimeiroAcesso]=useState(null);
  const [novaSenha,setNovaSenha]=useState("");
  const [novaSenha2,setNovaSenha2]=useState("");

  const login=async()=>{
    if(!user.trim()||!pass.trim()){setErr("Preencha usuário e senha");return;}
    setLoading(true);setErr("");
    const{data:rows}=await sb.from("usuarios").select("*").eq("nome",user.trim()).eq("ativo",true);
    if(!rows||rows.length===0){setErr("Usuário não encontrado");setLoading(false);return;}
    const u=rows[0];
    if(u.senha!==pass){setErr("Senha incorreta");setLoading(false);return;}
    if(u.primeiro_acesso){setPrimeiroAcesso(u);setLoading(false);return;}
    onLogin(u);
    setLoading(false);
  };

  const definirSenha=async()=>{
    if(novaSenha.length<4){setErr("Mínimo 4 caracteres");return;}
    if(novaSenha!==novaSenha2){setErr("Senhas não conferem");return;}
    setLoading(true);
    await sb.from("usuarios").update({senha:novaSenha,primeiro_acesso:false}).eq("id",primeiroAcesso.id);
    onLogin({...primeiroAcesso,senha:novaSenha,primeiro_acesso:false});
  };

  if(primeiroAcesso)return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
    React.createElement("div",{style:{width:"100%",maxWidth:380,background:C.card,borderRadius:20,padding:28,border:"1px solid "+C.border}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:24}},
        React.createElement("div",{style:{fontSize:32,marginBottom:8}},"🔑"),
        React.createElement("div",{style:{fontSize:18,fontWeight:700}}),"Primeiro Acesso",
        React.createElement("div",{style:{fontSize:13,color:C.muted,marginTop:4}}),"Defina sua senha pessoal"
      ),
      ["Nova senha","Confirmar senha"].map((lbl,i)=>
        React.createElement("div",{key:i,style:{marginBottom:14}},
          React.createElement("label",{style:{fontSize:12,color:C.muted,display:"block",marginBottom:6}},lbl),
          React.createElement("input",{type:"password",style:{width:"100%",background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:15,outline:"none"},value:i===0?novaSenha:novaSenha2,onChange:e=>i===0?setNovaSenha(e.target.value):setNovaSenha2(e.target.value)})
        )
      ),
      err&&React.createElement("div",{style:{color:C.red,fontSize:12,marginBottom:12,textAlign:"center"}},err),
      React.createElement("button",{style:{width:"100%",padding:"14px",background:C.blue,border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"},onClick:definirSenha},loading?"Salvando...":"Confirmar e Entrar")
    )
  );

  return React.createElement("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}},
    React.createElement("div",{style:{width:"100%",maxWidth:380}},

// ── LISTA DE OS ────────────────────────────────────────────────
function ListaOS({usuario,onSelect,onLogout}){
  const [osList,setOsList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filtro,setFiltro]=useState("Minhas");

  const load=useCallback(async()=>{
    setLoading(true);
    const{data:os}=await sb.from("os").select("*").eq("status","Aberto").order("data",{ascending:false});
    const{data:campo}=await sb.from("os_campo").select("*");
    const merged=(os||[]).map(o=>{
      const c=(campo||[]).find(x=>x.num===o.num&&x.tec===usuario.nome);
      return {...o,campo:c||null};
    });
    setOsList(merged);
    setLoading(false);
  },[usuario]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{const t=setInterval(load,60000);return()=>clearInterval(t);},[load]);

  const filtered=filtro==="Minhas"?osList.filter(o=>o.tec===usuario.nome):osList;
  const emAtend=osList.filter(o=>o.campo&&o.campo.status_campo!=="Concluído"&&o.campo.status_campo!=="Aguardando").length;

  const statusCor=(s)=>s==="Concluído"?C.green:s==="Em Atendimento"?C.orange:s==="A Caminho"?C.yellow:C.dim;
  const priCor=(p)=>p==="Alta"?C.red:p==="Média"?C.yellow:C.green;

  return React.createElement("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column"}},
    // Header
    React.createElement("div",{style:{background:C.surface,padding:"14px 16px",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:10}},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
          React.createElement("div",{style:{width:36,height:36,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}},usuario.nome[0].toUpperCase()),
          React.createElement("div",null,
            React.createElement("div",{style:{fontSize:14,fontWeight:700}},usuario.nome),
            React.createElement("div",{style:{fontSize:11,color:C.muted}},emAtend>0?"🟠 "+emAtend+" em andamento":"🟢 Disponível")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          React.createElement("button",{style:{background:"none",border:"none",color:C.muted,fontSize:20,cursor:"pointer"},onClick:load},"🔄"),
          React.createElement("button",{style:{background:C.red+"22",border:"1px solid "+C.red+"44",color:C.red,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"},onClick:onLogout},"Sair")
        )
      ),
      // Filtros
      React.createElement("div",{style:{display:"flex",gap:8,marginTop:10}},
        ["Minhas","Todas"].map(f=>
          React.createElement("button",{key:f,style:{flex:1,padding:"8px",background:filtro===f?C.blue:"transparent",border:"1px solid "+(filtro===f?C.blue:C.border),borderRadius:8,color:filtro===f?"#fff":C.muted,fontSize:13,cursor:"pointer"},onClick:()=>setFiltro(f)},f)
        )
      )
    ),
    // KPIs
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"12px 16px"}},
      [{l:"Abertas",v:osList.filter(o=>!o.campo||o.campo.status_campo==="Aguardando").length,c:C.red},
       {l:"Em campo",v:emAtend,c:C.orange},
       {l:"Hoje",v:osList.filter(o=>o.data===new Date().toISOString().split("T")[0]).length,c:C.blue}
      ].map((k,i)=>
        React.createElement("div",{key:i,style:{background:C.card,borderRadius:12,padding:"10px 12px",textAlign:"center",border:"1px solid "+k.c+"33"}},
          React.createElement("div",{style:{fontSize:22,fontWeight:800,color:k.c}},k.v),
          React.createElement("div",{style:{fontSize:11,color:C.muted}},k.l)
        )
      )
    ),
    // Lista
    loading?React.createElement("div",{style:{textAlign:"center",padding:60,color:C.muted}},"Carregando OS..."):
    React.createElement("div",{style:{padding:"0 16px 24px",flex:1}},
      filtered.length===0?React.createElement("div",{style:{textAlign:"center",padding:60,color:C.dim}},
        React.createElement("div",{style:{fontSize:40,marginBottom:12}},"✅"),
        React.createElement("div",{style:{fontSize:15,fontWeight:600}}),"Nenhuma OS aberta",
        React.createElement("div",{style:{fontSize:13,color:C.dim,marginTop:4}}),"Tudo em dia!"
      ):
      filtered.map(os=>
        React.createElement("div",{key:os.id,className:"card",style:{background:C.card,borderRadius:14,padding:16,marginBottom:10,border:"1px solid "+(os.campo&&os.campo.status_campo!=="Aguardando"?C.orange:C.border),cursor:"pointer"},onClick:()=>onSelect(os)},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
            React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center"}},
              React.createElement("span",{style:{fontSize:13,fontWeight:800,color:C.cyan}},"#"+os.num),
              React.createElement("span",{style:{background:priCor(os.pri)+"22",color:priCor(os.pri),fontSize:10,padding:"1px 7px",borderRadius:10,fontWeight:600}},os.pri||"Média")
            ),
            os.campo&&os.campo.status_campo!=="Aguardando"
              ?React.createElement("span",{style:{background:statusCor(os.campo.status_campo)+"22",color:statusCor(os.campo.status_campo),fontSize:10,padding:"2px 8px",borderRadius:10,fontWeight:600}},os.campo.status_campo)
              :React.createElement("span",{style:{background:C.dim+"22",color:C.dim,fontSize:10,padding:"2px 8px",borderRadius:10}},"Aguardando")
          ),
          React.createElement("div",{style:{fontSize:14,fontWeight:600,marginBottom:4}},os.cond),
          React.createElement("div",{style:{fontSize:12,color:C.muted,marginBottom:6}},os.prob),
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement("span",{style:{fontSize:11,color:C.dim}},"📅 "+os.data),
            React.createElement("span",{style:{fontSize:11,color:C.blue}},"Ver detalhes →")
          )
        )
      )
    )
  );
}

// ── DETALHE DA OS ──────────────────────────────────────────────
function DetalheOS({os,usuario,onBack}){
  const [campo,setCampo]=useState(os.campo||null);
  const [loading,setLoading]=useState(false);
  const [fotos,setFotos]=useState([]);
  const [problema,setProblema]=useState(os.campo?.problema||"");
  const [solucao,setSolucao]=useState(os.campo?.solucao||"");
  const [material,setMaterial]=useState(os.campo?.material||"");
  const [msg,setMsg]=useState("");
  const [gerandoPDF,setGerandoPDF]=useState(false);

  const STATUS_ORDER=["Aguardando","A Caminho","No Local","Em Atendimento","Concluído"];
  const statusAtual=campo?.status_campo||"Aguardando";
  const idxAtual=STATUS_ORDER.indexOf(statusAtual);

  const getGPS=()=>new Promise((res)=>{
    if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),()=>res({lat:null,lng:null}),{timeout:5000});
    else res({lat:null,lng:null});
  });

  const avancarStatus=async()=>{
    const proximo=STATUS_ORDER[idxAtual+1];
    if(!proximo)return;
    if(proximo==="Concluído"){
      if(!problema.trim()){setMsg("⚠ Preencha o problema encontrado");return;}
      if(!solucao.trim()){setMsg("⚠ Preencha a solução aplicada");return;}
      if(fotos.length===0&&!campo?.foto_url){setMsg("⚠ Adicione pelo menos 1 foto");return;}
    }
    setLoading(true);setMsg("");
    const gps=await getGPS();
    const agora=new Date().toISOString();
    const updates={status_campo:proximo,tec:usuario.nome,num:os.num,problema,solucao,material};
    if(proximo==="A Caminho"){updates.dt_deslocamento=agora;updates.lat_deslocamento=gps.lat;updates.lng_deslocamento=gps.lng;}
    if(proximo==="No Local"){updates.dt_chegada=agora;updates.lat_chegada=gps.lat;updates.lng_chegada=gps.lng;}
    if(proximo==="Em Atendimento"){updates.dt_inicio_atend=agora;}
    if(proximo==="Concluído"){
      updates.dt_conclusao=agora;updates.lat_conclusao=gps.lat;updates.lng_conclusao=gps.lng;
      // Salvar fotos
      if(fotos.length>0)updates.foto_url=fotos[0];
      if(fotos.length>1)updates.foto2_url=fotos[1];
      if(fotos.length>2)updates.foto3_url=fotos[2];
      // Fechar OS no banco principal
      await sb.from("os").update({status:"Fechado",relato:problema+"

Solução: "+solucao+(material?"

Material: "+material:"")}).eq("num",os.num);
    }
    if(campo?.id){
      const{data}=await sb.from("os_campo").update(updates).eq("id",campo.id).select().single();
      setCampo(data);
    }else{
      const{data}=await sb.from("os_campo").insert({...updates,id:"oc_"+Date.now()}).select().single();
      setCampo(data);
    }
    setLoading(false);
    if(proximo==="Concluído")setMsg("✅ OS concluída com sucesso!");
  };

  const handleFoto=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(file=>{
      const r=new FileReader();
      r.onload=ev=>setFotos(p=>[...p,ev.target.result].slice(0,3));
      r.readAsDataURL(file);
    });
  };

  const gerarPDF=()=>{
    setGerandoPDF(true);
    const w=window.open("","_blank");
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;padding:30px;color:#1e293b;font-size:13px;}
    h1{font-size:20px;color:#1e40af;border-bottom:3px solid #3b82f6;padding-bottom:8px;margin-bottom:20px;}
    h2{font-size:14px;color:#374151;margin:16px 0 8px;background:#f8fafc;padding:6px 10px;border-radius:4px;}
    .row{display:flex;gap:20px;margin-bottom:8px;}
    .field{flex:1;}
    label{font-size:11px;color:#6b7280;display:block;}
    value{font-size:13px;font-weight:600;}
    .status{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:#dbeafe;color:#1e40af;}
    @media print{body{padding:15px;}}
    </style></head><body>
    <h1>🔧 Ordem de Serviço #${os.num}</h1>
    <div class="row">
      <div class="field"><label>Condomínio</label><value>${os.cond}</value></div>
      <div class="field"><label>Data</label><value>${os.data}</value></div>
    </div>
    <div class="row">
      <div class="field"><label>Técnico</label><value>${usuario.nome}</value></div>
      <div class="field"><label>Prioridade</label><value>${os.pri||"Média"}</value></div>
    </div>
    <h2>Problema Reportado</h2><p>${os.prob||"—"}</p>
    ${campo?.problema?`<h2>Diagnóstico do Técnico</h2><p>${campo.problema}</p>`:""}
    ${campo?.solucao?`<h2>Solução Aplicada</h2><p>${campo.solucao}</p>`:""}
    ${campo?.material?`<h2>Material Utilizado</h2><p>${campo.material}</p>`:""}
    <h2>Registro de Tempo</h2>
    <div class="row">
      <div class="field"><label>Deslocamento</label><value>${campo?.dt_deslocamento?new Date(campo.dt_deslocamento).toLocaleString("pt-BR"):"—"}</value></div>
      <div class="field"><label>Chegada</label><value>${campo?.dt_chegada?new Date(campo.dt_chegada).toLocaleString("pt-BR"):"—"}</value></div>
    </div>
    <div class="row">
      <div class="field"><label>Início Atendimento</label><value>${campo?.dt_inicio_atend?new Date(campo.dt_inicio_atend).toLocaleString("pt-BR"):"—"}</value></div>
      <div class="field"><label>Conclusão</label><value>${campo?.dt_conclusao?new Date(campo.dt_conclusao).toLocaleString("pt-BR"):"—"}</value></div>
    </div>
    <scr`+"ipt>window.onload=()=>window.print();</scr"+"ipt></body></html>";
    w.document.write(html);w.document.close();
    setGerandoPDF(false);
  };

  const btnProximo={
    "Aguardando":{label:"🚗 Iniciar Deslocamento",c:C.blue},
    "A Caminho":{label:"📍 Cheguei ao Condomínio",c:C.yellow},
    "No Local":{label:"🔧 Iniciar Atendimento",c:C.orange},
    "Em Atendimento":{label:"✅ Concluir Atendimento",c:C.green},
  }[statusAtual];

  return React.createElement("div",{style:{minHeight:"100vh",paddingBottom:100}},
    // Header
    React.createElement("div",{style:{background:C.surface,padding:"14px 16px",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:10,display:"flex",alignItems:"center",gap:12}},
      React.createElement("button",{style:{background:"none",border:"none",color:C.text,fontSize:22,cursor:"pointer",padding:4},onClick:onBack},"←"),
      React.createElement("div",{style:{flex:1}},
        React.createElement("div",{style:{fontSize:15,fontWeight:700}},"OS #"+os.num),
        React.createElement("div",{style:{fontSize:12,color:C.muted}},os.cond)
      ),
      React.createElement("button",{style:{background:C.blue+"22",border:"1px solid "+C.blue+"44",color:C.blue,borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer"},onClick:gerarPDF},gerandoPDF?"...":"📄 PDF")
    ),
    React.createElement("div",{style:{padding:16}},
      // Progress Steps
      React.createElement("div",{style:{display:"flex",alignItems:"center",marginBottom:20,overflowX:"auto",paddingBottom:4}},
        STATUS_ORDER.map((s,i)=>{
          const ativo=i<=idxAtual;
          const atual=i===idxAtual;
          return React.createElement("div",{key:s,style:{display:"flex",alignItems:"center",flexShrink:0}},
            React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},
              React.createElement("div",{style:{width:28,height:28,borderRadius:"50%",background:ativo?C.blue:C.border,border:"2px solid "+(atual?C.cyan:ativo?C.blue:C.border),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:ativo?"#fff":C.dim}},ativo?"✓":i+1),
              React.createElement("div",{style:{fontSize:9,color:ativo?C.blue:C.dim,textAlign:"center",maxWidth:56,lineHeight:1.2}},s)
            ),
            i<STATUS_ORDER.length-1&&React.createElement("div",{style:{width:24,height:2,background:i<idxAtual?C.blue:C.border,margin:"0 4px",marginBottom:16}})
          );
        })
      ),

      // Info Card
      React.createElement("div",{style:{background:C.card,borderRadius:14,padding:16,marginBottom:14,border:"1px solid "+C.border}},
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
          [["Problema",os.prob],["Prioridade",os.pri||"Média"],["Data",os.data],["Técnico",os.tec]].map(([l,v],i)=>
            React.createElement("div",{key:i},
              React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:2}},l),
              React.createElement("div",{style:{fontSize:13,fontWeight:600}},v||"—")
            )
          )
        )
      ),

      // Timeline de horários
      campo&&(campo.dt_deslocamento||campo.dt_chegada||campo.dt_inicio_atend||campo.dt_conclusao)&&
      React.createElement("div",{style:{background:C.card,borderRadius:14,padding:16,marginBottom:14,border:"1px solid "+C.border}},
        React.createElement("div",{style:{fontSize:13,fontWeight:700,marginBottom:10,color:C.cyan}},"⏱ Registro de Tempo"),
        [["🚗 Deslocamento",campo.dt_deslocamento],["📍 Chegada",campo.dt_chegada],["🔧 Início",campo.dt_inicio_atend],["✅ Conclusão",campo.dt_conclusao]].filter(([,v])=>v).map(([l,v],i)=>
          React.createElement("div",{key:i,style:{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid "+C.border,fontSize:13}},
            React.createElement("span",{style:{color:C.muted}},l),
            React.createElement("span",{style:{fontWeight:600}},new Date(v).toLocaleTimeString("pt-BR"))
          )
        )
      ),

      // Formulário técnico
      (idxAtual>=2)&&React.createElement("div",{style:{background:C.card,borderRadius:14,padding:16,marginBottom:14,border:"1px solid "+C.border}},
        React.createElement("div",{style:{fontSize:13,fontWeight:700,marginBottom:12,color:C.orange}},"📝 Relatório Técnico"),
        [["Problema encontrado *",problema,setProblema],["Solução aplicada *",solucao,setSolucao],["Material utilizado",material,setMaterial]].map(([lbl,val,setter],i)=>
          React.createElement("div",{key:i,style:{marginBottom:12}},
            React.createElement("label",{style:{fontSize:12,color:C.muted,display:"block",marginBottom:6}},lbl),
            React.createElement("textarea",{style:{width:"100%",background:C.surface,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:14,outline:"none",minHeight:80,resize:"vertical"},value:val,onChange:e=>setter(e.target.value),placeholder:"Descreva aqui..."})
          )
        )
      ),

      // Fotos
      (idxAtual>=2)&&React.createElement("div",{style:{background:C.card,borderRadius:14,padding:16,marginBottom:14,border:"1px solid "+C.border}},
        React.createElement("div",{style:{fontSize:13,fontWeight:700,marginBottom:12,color:C.purple||"#a855f7"}},"📸 Fotos (obrigatório)"),
        React.createElement("label",{htmlFor:"foto-input",style:{display:"block",background:C.surface,border:"2px dashed "+C.border,borderRadius:10,padding:"20px",textAlign:"center",cursor:"pointer",marginBottom:12}},
          React.createElement("div",{style:{fontSize:28,marginBottom:6}},"📷"),
          React.createElement("div",{style:{fontSize:13,color:C.muted}},"Toque para adicionar fotos"),
          React.createElement("div",{style:{fontSize:11,color:C.dim,marginTop:2}},"Máx. 3 fotos")
        ),
        React.createElement("input",{type:"file",accept:"image/*",multiple:true,capture:"environment",id:"foto-input",style:{display:"none"},onChange:handleFoto}),
        fotos.length>0&&React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}},
          fotos.map((f,i)=>React.createElement("div",{key:i,style:{position:"relative"}},
            React.createElement("img",{src:f,style:{width:"100%",height:80,objectFit:"cover",borderRadius:8}}),
            React.createElement("button",{style:{position:"absolute",top:4,right:4,background:"rgba(0,0,0,0.6)",border:"none",color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:12,cursor:"pointer"},onClick:()=>setFotos(p=>p.filter((_,j)=>j!==i))},"×")
          ))
        ),
        campo?.foto_url&&fotos.length===0&&React.createElement("div",{style:{color:C.green,fontSize:12,marginTop:8}},"✅ 1 foto já registrada")
      ),

      // Mensagem
      msg&&React.createElement("div",{style:{background:msg.includes("✅")?C.green+"22":C.red+"22",border:"1px solid "+(msg.includes("✅")?C.green:C.red)+"44",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,textAlign:"center",fontWeight:600}},msg),

      // Botão de ação
      btnProximo&&statusAtual!=="Concluído"&&React.createElement("button",{style:{width:"100%",padding:"16px",background:`linear-gradient(135deg,${btnProximo.c},${btnProximo.c}cc)`,border:"none",borderRadius:14,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px "+btnProximo.c+"44"},onClick:avancarStatus,disabled:loading},
        loading?React.createElement("span",{className:"spin"},"⟳ Registrando..."):btnProximo.label
      ),
      statusAtual==="Concluído"&&React.createElement("div",{style:{background:C.green+"22",border:"1px solid "+C.green+"44",borderRadius:14,padding:20,textAlign:"center"}},
        React.createElement("div",{style:{fontSize:36,marginBottom:8}},"✅"),
        React.createElement("div",{style:{fontSize:16,fontWeight:700,color:C.green}}),"OS Concluída!",
        React.createElement("div",{style:{fontSize:13,color:C.muted,marginTop:4}}),"Concluída em "+new Date(campo.dt_conclusao).toLocaleString("pt-BR")
      )
    )
  );
}

// ── APP PRINCIPAL ──────────────────────────────────────────────
function App(){
  const [usuario,setUsuario]=useState(null);
  const [osSel,setOsSel]=useState(null);

  useEffect(()=>{
    const u=sessionStorage.getItem("servis_campo_user");
    if(u)try{setUsuario(JSON.parse(u));}catch(e){}
  },[]);

  const login=u=>{setUsuario(u);sessionStorage.setItem("servis_campo_user",JSON.stringify(u));};
  const logout=()=>{setUsuario(null);setOsSel(null);sessionStorage.removeItem("servis_campo_user");};

  if(!usuario)return React.createElement(Login,{onLogin:login});
  if(osSel)return React.createElement(DetalheOS,{os:osSel,usuario,onBack:()=>setOsSel(null)});
  return React.createElement(ListaOS,{usuario,onSelect:setOsSel,onLogout:logout});
}

ReactDOM.render(React.createElement(App,null),document.getElementById("root"));
</script>
</body>
</html>
